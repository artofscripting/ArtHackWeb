const inp=document.getElementById('inp');

document.addEventListener('keydown',e=>{
  if(G.overlay==='title'){handleTitleKey(e);return;}
  if(G.overlay==='resume'){handleResumeKey(e);return;}
  if(G.overlay==='archetype'){handleArchKey(e);return;}
  if(G.overlay==='difficulty'){handleDifficultyKey(e);return;}
  if(G.overlay==='story'){handleStoryKey(e);return;}
  if(G.overlay==='return_reveal'){handleReturnRevealKey(e);return;}
  if(G.overlay==='win'||G.overlay==='dead'||G.overlay==='quit'||G.overlay==='summary'){
    if(G.overlay==='dead'){clearRunState();restartGame();}
    else G.overlay=null;
    render();return;
  }
  if(G.cmdMode){if(e.key==='Enter'){resetCmdInputStyle();processCmd(G.cmdBuf);G.cmdBuf='';render();}
  else if(e.key==='Escape'){resetCmdInputStyle();G.cmdBuf='';}
  return;}
  if(G.overlay){handleOverlayKey(e);render();return;}
  const k=e.key;
  if(k==='t'||k==='T'){if(adjTerminal()){openTerminalShell();render();return;}G.cmdMode=true;G.cmdBuf='';inp.style.display='block';inp.focus();setTimeout(()=>{inp.value='';updateCmdInputPosition();},0);return;}
  if(k==='/'){G.cmdMode=true;G.cmdBuf='';inp.style.display='block';inp.focus();setTimeout(()=>{inp.value='';updateCmdInputPosition();},0);return;}
  if(k==='m'||k==='M'){openMapPanel();render();return;}
  if(k==='i'||k==='I'){G.overlay='inventory';G.invCursor=0;G.invScroll=0;render();return;}
  if(k==='g'||k==='G'){openCraftPanel();render();return;}
  if(k==='p'||k==='P'){if(currentShop())openShopPanel(true);else G.overlay='toolkit';render();return;}
  if(k==='0'){G.overlay='console';G.consoleCursor=0;G.consoleInvCursor=0;G.consoleFocus='slots';render();return;}
  if(k==='o'||k==='O'){openLogOverlay();render();return;}
  if(k==='='){G.overlay='summary';render();return;}
  if(k==='u'||k==='U'){G.overlay='skills';render();return;}
  if(k==='n'||k==='N'){G.overlay='journal';render();return;}
  if(k==='8'){openSecretsOverlay();render();return;}
  if(k==='9'){openTravelPanel();render();return;}
  if(k==='c'){G.overlay='commands';render();return;}
  if(k==='?'){G.overlay='help';render();return;}
  if(k==='l'||k==='L'){lookAround();render();return;}
  if(k==='e'||k==='E'||k===' '){searchHere();render();return;}
  if(k==='A'){autoLootRoom();render();return;}
  if(k==='v'||k==='V'){G.stealthMode=!G.stealthMode;addLog(G.stealthMode?'Stealth ON.':'Stealth OFF.',M.sky);render();return;}
  if(k==='z'||k==='Z'){
    if(!G.shootMode&&!G.equipped.weapon?.range){addLog('Equip a bow, crossbow, or slingshot to shoot.',M.red);render();return;}
    G.shootMode=!G.shootMode;addLog(G.shootMode?'Shoot mode ON.':'Shoot mode OFF.',M.red);render();return;
  }
  if(k==='f'||k==='F'){doConfront();render();return;}
  if(k==='x'||k==='X'){beginTerminalHack(adjTerminal(),'balanced');render();return;}
  if(k==='-'){processCmd('clearlogs');render();return;}
  if(k==='r'||k==='R'){addLog('You rest and listen to the castle.',M.sub);endTurn();render();return;}
  if(k==='q'||k==='Q'){if(confirm('Quit ARTHACK?')){G.overlay='quit';render();}return;}
  e.preventDefault();
  let dx=0,dy=0;
  if(k==='ArrowUp'||k==='w'||k==='W'||k==='k')dy=-1;
  else if(k==='ArrowDown'||k==='s'||k==='S'||k==='j')dy=1;
  else if(k==='ArrowLeft'||k==='a'||k==='A'||k==='h')dx=-1;
  else if(k==='ArrowRight'||k==='d'||k==='D')dx=1;
  else if(k==='y'){{dx=-1;dy=-1;}}else if(k==='u'){dx=1;dy=-1;}
  else if(k==='b'){dx=-1;dy=1;}else if(k==='n'){dx=1;dy=1;}
  if(dx!==0||dy!==0){if(G.shootMode)doRangedShot(dx,dy);else tryMove(dx,dy);}
  render();
});

function handleArchKey(e){
  const order=ARCHETYPE_ORDER;
  const pg=archetypePageSize();
  const maxCur=order.length-1;
  if(G._archCursor===undefined)G._archCursor=0;
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='k')G._archCursor=Math.max(0,(G._archCursor||0)-1);
  else if(e.key==='ArrowDown'||e.key==='s'||e.key==='j')G._archCursor=Math.min(maxCur,(G._archCursor||0)+1);
  else if(e.key==='PageUp')G._archCursor=Math.max(0,(G._archCursor||0)-pg);
  else if(e.key==='PageDown')G._archCursor=Math.min(maxCur,(G._archCursor||0)+pg);
  else if(e.key==='Home'){G._archScroll=0;G._archCursor=0;}
  else if(e.key==='End'){G._archScroll=Math.max(0,order.length-pg);G._archCursor=maxCur;}
  else if(e.key>='1'&&e.key<='9'){
    const vis=Math.min(pg,parseInt(e.key,10));
    const idx=(G._archScroll||0)+vis-1;
    if(idx<=maxCur)G._archCursor=idx;
  }
  else if(e.key==='Enter'||(e.key===' '&&!e.shiftKey)){confirmArchetype();return;}
  ({cursor:G._archCursor,scroll:G._archScroll}=clampListView(G._archCursor||0,G._archScroll||0,order.length,pg));
  render();
}

function startRun(){
  clearRunState(_activeRunSlot);
  resetPanelSaveTrack(null);
  clearRemoteShop();
  clearRemoteCraft();
  clearRemoteTerm();
  G.overlay=null;
  G.escaped=false;
  G.phase='escape';
  G.clues=0;
  G.portalArmed=false;
  G.smokeUntil=0;
  G.travel={shop:null,anvil:null,table:null,terminal:null};
  generateDungeon();generateContracts();
  if(BONUS)applyBonus();
  G._lastStoryTier=storyTier();
  computeVisible(visionRadius());render();
}

function handleDifficultyKey(e){
  const order=['easy','normal','hard','nightmare'];
  if(G._diffCursor===undefined)G._diffCursor=1;
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='k')G._diffCursor=(G._diffCursor+3)%4;
  else if(e.key==='ArrowDown'||e.key==='s'||e.key==='j')G._diffCursor=(G._diffCursor+1)%4;
  else if(['1','2','3','4'].includes(e.key))G._diffCursor=Number(e.key)-1;
  else if(e.key==='Enter'||e.key===' '){confirmDifficulty();return;}
  render();
}

function handleOverlayKey(e){
  if(G.overlay==='term_shell'){handleTermShellKey(e);return;}
  if(G.overlay==='minigame'){handleMinigameKey(e);return;}
  if(G.overlay==='console'){handleConsoleKey(e);return;}
  if(G.overlay==='craft'&&G.craftConfirm&&(e.key==='Escape'||e.key==='q'||e.key==='n'||e.key==='N')){
    cancelSocketConfirm();
    return;
  }
  if(G.overlay==='travel'&&G.travelConfirm&&(e.key==='Escape'||e.key==='q'||e.key==='n'||e.key==='N')){
    G.travelConfirm=null;
    return;
  }
  if(e.key==='Escape'||e.key==='q'){
    if(G.overlay==='shop')clearRemoteShop();
    if(G.overlay==='craft')clearRemoteCraft();
    if(G.overlay==='module_select'||G.overlay==='hack')clearRemoteTerm();
    if(G.overlay==='black_market')G._blackMarketTerm=null;
    G.overlay=null;return;
  }
  if(G.overlay==='log'){
    const geo=logOverlayGeometry();
    const rows=logOverlayRows(geo.contentW),contentH=geo.contentH,maxScroll=Math.max(0,rows.length-contentH);
    if(e.key==='ArrowUp'||e.key==='k')G.logScroll=Math.max(0,G.logScroll-1);
    else if(e.key==='ArrowDown'||e.key==='j')G.logScroll=Math.min(maxScroll,G.logScroll+1);
    else if(e.key==='PageUp')G.logScroll=Math.max(0,G.logScroll-contentH);
    else if(e.key==='PageDown'||e.key===' ')G.logScroll=Math.min(maxScroll,G.logScroll+contentH);
    else if(e.key==='Home')G.logScroll=0;
    else if(e.key==='End')G.logScroll=maxScroll;
    else if(e.key==='f'||e.key==='F')cycleLogFilter(1);
    else G.overlay=null;
  } else if(G.overlay==='secrets'){
    const entries=secretEntries();
    const pg=overlayListPageSize(5,4);
    if(e.key==='ArrowUp'||e.key==='k')G.secretsCursor=Math.max(0,(G.secretsCursor||0)-1);
    else if(e.key==='ArrowDown'||e.key==='j')G.secretsCursor=Math.min(Math.max(0,entries.length-1),(G.secretsCursor||0)+1);
    else if(e.key==='PageUp')G.secretsCursor=Math.max(0,(G.secretsCursor||0)-pg);
    else if(e.key==='PageDown'||e.key===' ')G.secretsCursor=Math.min(Math.max(0,entries.length-1),(G.secretsCursor||0)+pg);
    else if(e.key==='Home')G.secretsCursor=0;
    else if(e.key==='End')G.secretsCursor=Math.max(0,entries.length-1);
  } else if(G.overlay==='map'){
    if(!MAPV)fitMap();
    const a=mapAvail(),step=Math.max(24,a.w*0.12),cx=a.x0+a.w/2,cy=a.y0+a.h/2;
    if(e.key==='m'||e.key==='M')G.overlay=null;
    else if(e.key==='+'||e.key==='='||e.key==='k'||e.key==='K')mapZoomAt(cx,cy,1.25);
    else if(e.key==='-'||e.key==='_'||e.key==='j'||e.key==='J')mapZoomAt(cx,cy,1/1.25);
    else if(e.key==='f'||e.key==='F'||e.key==='0')fitMap();
    else if(e.key==='ArrowUp'||e.key==='w')MAPV.oy+=step;
    else if(e.key==='ArrowDown'||e.key==='s')MAPV.oy-=step;
    else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='h')MAPV.ox+=step;
    else if(e.key==='ArrowRight'||e.key==='d'||e.key==='l')MAPV.ox-=step;
    mapClampPan();
  } else if(G.overlay==='travel'){
    const entries=travelEntries();
    if(G.travelConfirm){
      if(e.key==='Enter'||e.key==='y'||e.key==='Y')doTravelTeleport(G.travelConfirm);
      return;
    }
    if(e.key==='ArrowUp'||e.key==='k')G.travelCursor=Math.max(0,(G.travelCursor||0)-1);
    else if(e.key==='ArrowDown'||e.key==='j')G.travelCursor=Math.min(entries.length-1,(G.travelCursor||0)+1);
    else if(e.key==='Home')G.travelCursor=0;
    else if(e.key==='End')G.travelCursor=Math.max(0,entries.length-1);
    else if(e.key==='Enter'){
      const ent=entries[G.travelCursor||0];
      if(ent?.dest)G.travelConfirm=ent.id;
      else addLog('That destination is not known yet.',M.red);
    }
  } else if(G.overlay==='inventory'){
    const entries=inventoryEntries();
    const layout=invPanelLayout(entries,G.invCursor||0);
    const pg=Math.max(1,layout.visibleCount);
    if(e.key==='ArrowUp'||e.key==='k')G.invCursor=Math.max(0,G.invCursor-1);
    else if(e.key==='ArrowDown'||e.key==='j')G.invCursor=Math.min(entries.length-1,G.invCursor+1);
    else if(e.key==='PageUp')G.invCursor=Math.max(0,G.invCursor-pg);
    else if(e.key==='PageDown'||e.key===' ')G.invCursor=Math.min(entries.length-1,G.invCursor+pg);
    else if(e.key==='Home')G.invCursor=0;
    else if(e.key==='End')G.invCursor=Math.max(0,entries.length-1);
    else if(e.key==='1'){G.invView='gear';G.invCursor=0;G.invScroll=0;}
    else if(e.key==='2'){G.invView='jewelry';G.invCursor=0;G.invScroll=0;}
    else if(e.key==='3'){G.invView='modules';G.invCursor=0;G.invScroll=0;}
    else if(e.key==='e'){const ent=entries[G.invCursor];if(ent){if(ent.origin==='equipped')doUnequip(ent.slot);else doEquip(ent.item.name);}}
    else if(e.key==='x'||e.key==='X'){const ent=entries[G.invCursor];if(ent)inspectItem(ent.item);}
    else if(e.key==='m'||e.key==='M'){
      const ent=entries[G.invCursor];
      if(ent&&ent.origin!=='equipped'){if(doMoveItem(ent.item.name))endTurn();}
      else addLog('That item cannot be moved right now.',M.red);
    }
    else if(e.key==='d'||e.key==='D'){
      const ent=entries[G.invCursor];
      if(ent&&ent.origin!=='equipped'){if(doDrop(ent.item.name))endTurn();}
      else addLog('Unequip or stash that item before dropping it.',M.red);
    }
    else if(e.key==='u'||e.key==='U'){
      const ent=entries[G.invCursor];const sel=ent?.item;
      if(ent&&ent.origin==='equipped')addLog('Unequip this item before using it.',M.red);
      else if(sel&&sel.kind==='potion'){doDrink(sel.name);endTurn();}
      else if(sel&&sel.kind==='consumable'){const r=useConsumable(sel);if(r.ok){if(r.turn)endTurn();else render();}}
      else if(sel&&sel.kind==='gadget'){const r=useGadget(sel);if(r.ok){if(r.turn)endTurn();else render();}}
      else if(sel&&sel.kind==='module'){installModuleItem(sel,'inventory');removeHeldItem(sel);endTurn();}
      else if(sel&&sel.kind==='console_part'){installConsolePart(sel);endTurn();}
      else addLog('That item cannot be used from here.',M.sub);
    }
    else if(e.key==='Enter'){
      const ent=entries[G.invCursor];const sel=ent?.item;
      if(sel&&sel.kind==='potion'){doDrink(sel.name);endTurn();}
      else if(sel&&sel.kind==='consumable'){const r=useConsumable(sel);if(r.ok){if(r.turn)endTurn();else render();}}
      else if(sel&&sel.kind==='gadget'){const r=useGadget(sel);if(r.ok){if(r.turn)endTurn();else render();}}
      else if(sel&&sel.kind==='module'){installModuleItem(sel,'inventory');removeHeldItem(sel);endTurn();}
      else if(sel&&sel.kind==='console_part'){installConsolePart(sel);endTurn();}
    }
  } else if(G.overlay==='craft'){
    if(G.craftConfirm){
      if(e.key==='Enter'||e.key==='y'||e.key==='Y')confirmSocketGem();
      return;
    }
    if(e.key==='s'||e.key==='S'){G.craftView='socket';G.craftCursor=0;G.craftScroll=0;G.gemCursor=0;G.gemScroll=0;G.craftConfirm=null;return;}
    else if(e.key==='r'||e.key==='R'){G.craftView='recipes';G.craftCursor=0;G.craftScroll=0;G.craftConfirm=null;return;}
    if(G.craftView==='recipes'){
      const filtered=craftRecipeList();
      const pg=overlayListPageSize(4,3);
      if(e.key==='ArrowUp'||e.key==='k')G.craftCursor=Math.max(0,G.craftCursor-1);
      else if(e.key==='ArrowDown'||e.key==='j')G.craftCursor=Math.min(Math.max(0,filtered.length-1),G.craftCursor+1);
      else if(e.key==='PageUp')G.craftCursor=Math.max(0,G.craftCursor-pg);
      else if(e.key==='PageDown')G.craftCursor=Math.min(Math.max(0,filtered.length-1),G.craftCursor+pg);
      else if(e.key==='Home')G.craftCursor=0;
      else if(e.key==='End')G.craftCursor=Math.max(0,filtered.length-1);
      else if(e.key==='f'||e.key==='F'){G.craftFilter=!G.craftFilter;G.craftCursor=0;G.craftScroll=0;}
      else if(e.key==='x'||e.key==='X'){const r=filtered[G.craftCursor];if(r)inspectRecipe(r);}
      else if(e.key==='Enter'){const r=filtered[G.craftCursor];if(r){doCraft(r);endTurn();}}
    } else {
      const items=socketableItems(),gems=availableGems();
      const{gearPage,gemPage}=craftSocketPageSizes(6);
      if(e.key==='ArrowUp'||e.key==='k'){
        G.craftCursor=Math.max(0,G.craftCursor-1);
        ({cursor:G.craftCursor,scroll:G.craftScroll}=clampListView(G.craftCursor,G.craftScroll||0,items.length,gearPage));
      }else if(e.key==='ArrowDown'||e.key==='j'){
        G.craftCursor=Math.min(Math.max(0,items.length-1),G.craftCursor+1);
        ({cursor:G.craftCursor,scroll:G.craftScroll}=clampListView(G.craftCursor,G.craftScroll||0,items.length,gearPage));
      }else if(e.key==='ArrowLeft'||e.key==='h'){
        if(gems.length){
          G.gemCursor=Math.max(0,(G.gemCursor||0)-1);
          ({cursor:G.gemCursor,scroll:G.gemScroll}=clampListView(G.gemCursor||0,G.gemScroll||0,gems.length,gemPage));
        }
      }else if(e.key==='ArrowRight'||e.key==='l'){
        if(gems.length){
          G.gemCursor=Math.min(gems.length-1,(G.gemCursor||0)+1);
          ({cursor:G.gemCursor,scroll:G.gemScroll}=clampListView(G.gemCursor||0,G.gemScroll||0,gems.length,gemPage));
        }
      }else if(e.key==='PageUp'){
        G.craftCursor=Math.max(0,G.craftCursor-gearPage);
        ({cursor:G.craftCursor,scroll:G.craftScroll}=clampListView(G.craftCursor,G.craftScroll||0,items.length,gearPage));
      }else if(e.key==='PageDown'){
        G.craftCursor=Math.min(Math.max(0,items.length-1),G.craftCursor+gearPage);
        ({cursor:G.craftCursor,scroll:G.craftScroll}=clampListView(G.craftCursor,G.craftScroll||0,items.length,gearPage));
      }else if(e.key==='x'||e.key==='X'){const item=items[G.craftCursor]?.item;if(item)inspectItem(item);}
      else if(e.key==='Enter')beginSocketConfirm();
    }
  } else if(G.overlay==='shop'){
    const shop=activeShop();if(!shop){clearRemoteShop();G.overlay=null;return;}
    const entries=G.shopMode==='stock'?shopStockEntries(shop.stock):sellEntries();
    const layout=shopListPanelLayout(entries,G.shopCursor||0);
    const pg=Math.max(1,layout.visibleCount);
    if(e.key==='ArrowUp'||e.key==='k')G.shopCursor=Math.max(0,G.shopCursor-1);
    else if(e.key==='ArrowDown'||e.key==='j')G.shopCursor=Math.min(Math.max(0,entries.length-1),G.shopCursor+1);
    else if(e.key==='PageUp')G.shopCursor=Math.max(0,G.shopCursor-pg);
    else if(e.key==='PageDown')G.shopCursor=Math.min(Math.max(0,entries.length-1),G.shopCursor+pg);
    else if(e.key==='Home')G.shopCursor=0;
    else if(e.key==='End')G.shopCursor=Math.max(0,entries.length-1);
    else if(e.key==='Enter'){
      const ent=entries[G.shopCursor];
      if(ent){
        if(G.shopMode==='stock'){doBuy(ent.item.name);endTurn();}
        else {doSell(ent.item.name);endTurn();}
      }
    }
    else if(e.key==='x'||e.key==='X'){

      if(ent){
        if(G.shopMode==='stock')inspectItem(ent.item,'Shop item');
        else inspectItem(ent.item);
      }
    }
    else if(e.key==='o'||e.key==='O'){const ent=entries[G.shopCursor];if(ent&&G.shopMode==='stock')placeBuyOrder(ent.item.name);}
    else if(e.key==='s'||e.key==='S'){G.shopMode='bag';G.shopCursor=0;G.shopScroll=0;}
    else if(e.key==='b'||e.key==='B'){G.shopMode='stock';G.shopCursor=0;G.shopScroll=0;}
    G.shopScroll=invEnsureScroll(entries,G.shopCursor||0,layout.listBudget,G.shopScroll||0);
  } else if(G.overlay==='black_market'){
    const term=G._blackMarketTerm||blackMarketTerminal();
    const stock=term?.blackMarketStock||[];
    const entries=shopStockEntries(stock);
    const layout=shopListPanelLayout(entries,G.shopCursor||0);
    const pg=Math.max(1,layout.visibleCount);
    if(e.key==='ArrowUp'||e.key==='k')G.shopCursor=Math.max(0,G.shopCursor-1);
    else if(e.key==='ArrowDown'||e.key==='j')G.shopCursor=Math.min(Math.max(0,entries.length-1),G.shopCursor+1);
    else if(e.key==='PageUp')G.shopCursor=Math.max(0,G.shopCursor-pg);
    else if(e.key==='PageDown')G.shopCursor=Math.min(Math.max(0,entries.length-1),G.shopCursor+pg);
    else if(e.key==='Enter'){const ent=entries[G.shopCursor];if(ent){doBuyBlackMarket(ent.item.name);endTurn();}}
    else if(e.key==='x'||e.key==='X'){const ent=entries[G.shopCursor];if(ent)inspectItem(ent.item,'Black market');}
    G.shopScroll=invEnsureScroll(entries,G.shopCursor||0,layout.listBudget,G.shopScroll||0);
  } else if(G.overlay==='hack'){
    const modes=Object.keys(MODE_SKILL);
    if(e.key==='ArrowUp'||e.key==='k')G.hackCursor=Math.max(0,G.hackCursor-1);
    else if(e.key==='ArrowDown'||e.key==='j')G.hackCursor=Math.min(modes.length-1,G.hackCursor+1);
    else if(e.key==='Enter'){execHack(modes[G.hackCursor]);G.overlay=null;endTurn();}
  } else if(G.overlay==='module_select'){
    const mods=[...G.modules];const loadout=G.hackLoadout;
    if(e.key==='Escape'){clearRemoteTerm();G.overlay=null;render();return;}
    if(e.key==='h'||e.key==='H'){
      execHackFromLoadout();
      render();return;
    }
    if(e.key==='ArrowUp'||e.key==='k')G.hackCursor=Math.max(0,G.hackCursor-1);
    else if(e.key==='ArrowDown'||e.key==='j')G.hackCursor=Math.min(Math.max(0,mods.length-1),G.hackCursor+1);
    else if(e.key===' '){
      const mod=mods[G.hackCursor];if(!mod){}
      else{const idx=loadout.indexOf(mod);if(idx>=0)loadout.splice(idx,1);else loadout.push(mod);}
    }
    else if(e.key==='['){
      const mod=mods[G.hackCursor];const idx=loadout.indexOf(mod);
      if(idx>0){[loadout[idx-1],loadout[idx]]=[loadout[idx],loadout[idx-1]];}
    }
    else if(e.key===']'){
      const mod=mods[G.hackCursor];const idx=loadout.indexOf(mod);
      if(idx>=0&&idx<loadout.length-1){[loadout[idx],loadout[idx+1]]=[loadout[idx+1],loadout[idx]];}
    }
    render();return;
  }
}

function doConfront(){
  let target=null,best=999;
  for(const e of Object.values(entities)){
    if(!e.hostile)continue;
    const d=Math.abs(e.x-G.px)+Math.abs(e.y-G.py);
    if(d<best){best=d;target=e;}
  }
  if(!target||best>6){addLog('No enemy to confront.',M.sub);return;}
  const sc=G.skills.social*4+15+(G.rep>0?G.rep:0);
  const roll=ri(0,99);
  heatBump(1);
  if(roll<sc){
    G.skills.social=(G.skills.social||0)+1;
    target.alerted=false;target.alertTimer=0;
    addLog(`Confronted ${target.name}: social check passed — ${target.name} backs off.`,M.grn);
  } else {
    addLog(`Confronted ${target.name}: social check failed.`,M.red);
    target.alerted=true;target.alertTimer=8;
    if(best<=1)doMeleeAttack(target);
  }
  endTurn();
}

function doRangedShot(dx,dy){
  G.shootMode=false;
  const wpn=G.equipped.weapon;
  if(!wpn||!wpn.range){addLog('No ranged weapon equipped.',M.red);return;}
  const range=(itemEffectiveStats(wpn)?.range||wpn.range||0)+Math.floor(G.skills.ranged/3)+(G.archetype==='deadeye'?1:0);
  let hit=false;
  for(let r=1;r<=range;r++){
    const tx=G.px+dx*r,ty=G.py+dy*r;
    const c=getc(grid,tx,ty);if(c==='#'||c==='='||c===VOID)break;
    const e=entityAt(tx,ty);
    if(e&&e.hostile){
      scaleEnemy(e);
      const wpnStats=itemEffectiveStats(wpn);
      const dmg=Math.max(1,(wpnStats.attack||1)+ri(0,3)+(G.archetype==='deadeye'?2:0)-e.arm);
      e.hp-=dmg;
      addSkillXP('ranged',1);
      if(e.hp<=0){awardKill(e,'shoot down');}
      else{addLog(`Shot ${e.name} for ${dmg}.`,M.yel);e.alerted=true;e.alertTimer=8;}
      heatBump(1);breakStealth();hit=true;break;
    }
  }
  if(!hit)addLog('Ranged shot: missed.',M.sub);
  endTurn();
}

function idbPut(key,val){

function idbDelete(key){

function storageSet(key,val){
  if(_storageBackend==='local'){try{localStorage.setItem(key,val);}catch{};return;}
  _idbCache.set(key,val);idbPut(key,val);
}
function storageRemove(key){
  if(_storageBackend==='local'){try{localStorage.removeItem(key);}catch{};return;}

function idbLoadAll(){
  return new Promise((resolve,reject)=>{
    const tx=_idb.transaction(IDB_STORE,'readonly');
    const req=tx.objectStore(IDB_STORE).openCursor();
    req.onsuccess=e=>{
      const cur=e.target.result;
      if(cur){_idbCache.set(cur.key,cur.value);cur.continue();}
      else resolve();
    };
    req.onerror=()=>reject(req.error);
  });

function migrateFromLocalStorage(){

    try{
      const v=localStorage.getItem(k);
      if(v==null)continue;
      if(!_idbCache.has(k)){_idbCache.set(k,v);idbPut(k,v);}
      localStorage.removeItem(k);
    }catch{}
  }

function openSaveStorage(){
  if(_idbReady)return _idbReady;
  _idbReady=new Promise(resolve=>{
    if(!window.indexedDB){_storageBackend='local';resolve();return;}
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore(IDB_STORE);};
    req.onsuccess=async e=>{
      _idb=e.target.result;
      try{await idbLoadAll();migrateFromLocalStorage();}catch{}

    };
    req.onerror=()=>{_storageBackend='local';resolve();};
  });

}

const GRID_RLE_MARK='\x1e';
function packGrid(grid){
  const h=grid.length,w=grid[0]?.length||WW;
  let body='';
  for(let y=0;y<h;y++){
    const row=grid[y];
    for(let x=0;x<w;){
      const c=row[x];
      let n=1;
      while(x+n<w&&row[x+n]===c)n++;
      if(n>4||c===GRID_RLE_MARK)body+=GRID_RLE_MARK+n+GRID_RLE_MARK+c;
      else body+=c.repeat(n);
      x+=n;
    }
  }
  return `${w}x${h}|${body}`;
}
function unpackGrid(packed){
  if(!packed)return Array.from({length:WH},()=>Array(WW).fill(' '));
  if(Array.isArray(packed)){
    if(!packed.length)return [];
    return typeof packed[0]==='string'?packed.map(row=>[...row]):packed.map(row=>[...row]);
  }
  const pipe=packed.indexOf('|');
  if(pipe<0)return unpackGridLegacyRows(packed);
  const [ws,hs]=packed.slice(0,pipe).split('x').map(Number);
  const body=packed.slice(pipe+1);
  const flat=[];
  for(let i=0;i<body.length;){
    if(body[i]===GRID_RLE_MARK){
      const mid=body.indexOf(GRID_RLE_MARK,i+1);
      const n=parseInt(body.slice(i+1,mid),10);
      const c=body[mid+1];
      for(let j=0;j<n;j++)flat.push(c);
      i=mid+2;
    }else{flat.push(body[i]);i++;}
  }
  const grid=[];
  for(let y=0;y<hs;y++)grid.push(flat.slice(y*ws,y*ws+ws));
  return grid;
}
function unpackGridLegacyRows(rows){
  if(typeof rows==='string')return unpackGrid(rows);

function importRunSaveText(text,slot){

  let data;

  if(!data||!data.G){fail('No game data (G) in file.');return;}
  if(!data.levelStore||!data.levelStore.length){fail('File has no level data.');return;}
  if(data.v!==1&&data.v!==RUN_SAVE_VER){fail(`Unsupported save version: ${data.v}.`);return;}

  if(sx<GX||sx>=GX+gw||sy<GY||sy>=GY+gh)return null;
  const tx=Math.floor((sx-GX)/(CW*GSCALE))+(G._camX||0);

    const tapDist=Math.hypot(e.clientX-_ovScroll.x,e.clientY-_ovScroll.y);
    if(tapDist<overlayTapSlopPx()){
      if(G.overlay==='minigame'){
        if(tapMinigame(e.clientX,e.clientY)){_ovScroll=null;render();return;}
      }
      if(G.overlay==='term_shell'){
        if(termShellDoubleTap()){_ovScroll=null;render();return;}
        _ovScroll=null;
        return;
      }
      if(G.overlay==='craft'&&tapCraftTab(e.clientX,e.clientY)){_ovScroll=null;return;}
      if(TAP_SELECT_OVERLAYS.has(G.overlay)&&tapOverlayList(e.clientY)){
        _ovScroll=null;
        return;
      }
      if(SCROLL_OVERLAYS.has(G.overlay))tapOverlayList(e.clientY);
    }
    _ovScroll=null;
    return;
  }
  const g=_gesture;_gesture=null;
  if(!g||e.pointerId!==g.id||!gestureLive())return;
  if(g.walked)return; // steps already taken during drag-hold
  const dx=e.clientX-g.x, dy=e.clientY-g.y, dist=Math.hypot(dx,dy);
  const dead=walkStepPx(); // swipe vs tap threshold
  if(dist>=dead){const d=dirFromVec(dx,dy);if(d)moveStep(d[0],d[1]);return;}
  const s=tapStep(e.clientX,e.clientY);
  if(s==='wait')doAction('r');                // pass a turn
  else if(s)moveStep(s[0],s[1]);
},{passive:true});
canvas.addEventListener('pointercancel',e=>{_gesture=null;_ovScroll=null;if(e)_mapPtrs.delete(e.pointerId);if(_mapPtrs.size<2)_mapPinch=null;},{passive:true});
(function initUI(){
  const link=document.getElementById('mode-link');
  const tui=document.getElementById('touch-ui');
  if(TOUCH_MODE){
    const u=new URL(location.href);u.searchParams.delete('touch');u.searchParams.set('desktop','1');
    link.innerHTML=`<a href="${u.href}">Desktop</a>`;
    tui.style.display='flex';
    // recalculate scale now that touch UI has a real offsetHeight
    requestAnimationFrame(refit);
  }else{
    const u=new URL(location.href);u.searchParams.delete('desktop');u.searchParams.set('touch','1');
    link.innerHTML=`<a href="${u.href}">Touch Mode</a>`;
  }
  // wire all data-key buttons: touchstart → simKey + preventDefault stops ghost click
  const tray=document.getElementById('tui-tray');
  const more=document.getElementById('tui-more');
  const closeTray=()=>{if(tray)tray.classList.remove('open');if(more){more.classList.remove('open');more.textContent='⋯ MORE';}};
  document.querySelectorAll('#touch-ui button[data-key]').forEach(b=>{
    const k=b.dataset.key, inTray=tray&&tray.contains(b);
    const fire=e=>{if(e)e.preventDefault();simKey(k);if(inTray)closeTray();};
    b.addEventListener('touchstart',fire,{passive:false});
    b.addEventListener('click',fire);
  });
  const termBtn=document.getElementById('tui-term-btn');
  if(termBtn){
    const openPrimary=e=>{
      if(e)e.preventDefault();
      if(termBtn.dataset.mode==='craft'){openCraftPanel();render();return;}
      if(termBtn.dataset.mode==='shop'){
        if(currentShop())openShopPanel(true);
        else{addLog('No quartermaster nearby — use a shop link from inventory.',M.red);render();}
        return;
      }
      if(!adjTerminal()){addLog('No terminal adjacent — move next to a ! terminal.',M.red);render();return;}
      openTerminalShell();render();
    };
    termBtn.addEventListener('touchstart',openPrimary,{passive:false});
    termBtn.addEventListener('click',openPrimary);
  }
  if(more&&tray){
    const toggle=e=>{if(e)e.preventDefault();const open=tray.classList.toggle('open');more.classList.toggle('open',open);more.textContent=open?'✕ CLOSE':'⋯ MORE';};
    more.addEventListener('touchstart',toggle,{passive:false});
    more.addEventListener('click',toggle);
  }
  const saveBtn=document.getElementById('tui-save-btn');
  if(saveBtn){
    const doSave=e=>{
      if(e)e.preventDefault();
      manualSave();
      closeTray();
      render();
    };
    saveBtn.addEventListener('touchstart',doSave,{passive:false});
    saveBtn.addEventListener('click',doSave);
  }
  bindFullscreen();
})();

bindViewportListeners();

// ── Init ──────────────────────────────────────────────────────
// One-time: shrink saves written by older (uncompressed) builds.
function recompressExistingSaves(){
  for(let i=0;i<RUN_SLOT_COUNT;i++){
    try{
      const v=storageGet(runSlotKey(i));
      if(v==null||v.slice(0,SAVE_LZ_PREFIX.length)===SAVE_LZ_PREFIX)continue;
      const data=parseRunSave(v);
      if(data&&data.G&&data.levelStore?.length)writeSlotText(i,v);
    }catch{}
  }
}
async function init(){
  ctx.font=`${CH}px 'Courier New',monospace`;
  ctx.textBaseline='top';ctx.textAlign='left';
  await openSaveStorage();
  migrateLegacyRunSave();
  recompressExistingSaves();
  applyProfileUnlocks();
  G.overlay='title';
  render();
}
init();
