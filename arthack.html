html{height:100%;background:#1e1e2e}
body{position:fixed;inset:0;width:100%;height:100vh;height:100dvh;background:#1e1e2e;overflow:hidden;overscroll-behavior:none;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}

#corner-ctrls{position:fixed;top:calc(2px + var(--safe-t));right:calc(4px + var(--safe-r));z-index:200;display:flex;gap:4px;align-items:center}
#mode-link{padding:2px 7px;background:rgba(17,17,27,0.88);border:1px solid #45475a;border-radius:3px;font:10px 'Courier New',monospace}
#mode-link a{color:#89b4fa;text-decoration:none}
#fs-btn{padding:2px 8px;background:rgba(17,17,27,0.88);border:1px solid #45475a;border-radius:3px;font:10px 'Courier New',monospace;color:#89b4fa;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;line-height:1.2}
#fs-btn:active{filter:brightness(1.45)}
#fs-btn[hidden]{display:none}
#touch-ui{position:fixed;bottom:0;left:0;width:100%;z-index:150;background:rgba(17,17,27,0.97);border-top:1px solid #585b70;padding:5px;padding-bottom:calc(5px + var(--safe-b));padding-left:calc(5px + var(--safe-l));padding-right:calc(5px + var(--safe-r));display:none;flex-direction:column;gap:5px}
#tui-primary{display:flex;gap:5px;width:100%}
#tui-primary button{flex:1;min-height:46px;font:600 12px 'Courier New',monospace;border-radius:7px;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;white-space:nowrap;overflow:hidden;background:#313244;border:1px solid #45475a;color:#cdd6f4}

#tui-primary button.term-ready{background:#1a2d45;border-color:#89b4fa;color:#89b4fa}
#tui-primary button.craft-ready{background:#1a2e1e;border-color:#a6e3a1;color:#a6e3a1}

#tui-tray.open{display:grid}
#tui-tray button{min-height:44px;font:11px 'Courier New',monospace;border-radius:7px;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;white-space:nowrap;overflow:hidden;background:#313244;border:1px solid #45475a;color:#cdd6f4}
#touch-ui button:active{filter:brightness(1.45)}
#touch-ui .bh{background:#1a2d45;border-color:#89b4fa;color:#89b4fa}
#touch-ui .bm{background:#1a2e1e;border-color:#a6e3a1;color:#a6e3a1}
#touch-ui .shop-ready{background:#2a271a;border-color:#f9e2af;color:#f9e2af}
#touch-ui .bo{background:#2e1c3a;border-color:#cba6f7;color:#cba6f7}
#touch-ui .bd{background:#2e1c1c;border-color:#f38ba8;color:#f38ba8}
#tui-more.open{background:#45293f;border-color:#f5c2e7;color:#f5c2e7}

#ctx-bar .cb{background:#1a2d45;border:1px solid #89b4fa;color:#89b4fa}
#ctx-bar .cg{background:#1a2e1e;border:1px solid #a6e3a1;color:#a6e3a1}

const POTION_FAMILY_ORDER=Object.keys(POTION_FAMILIES);
const NEURAL_SKILL_POOL=['recon','exploit','creds','lateral','persist','evasion','social'];
function potionTierForLvl(eff,variantCount){
  const maxT=Math.min(variantCount,Math.max(1,Math.floor(eff/2)+2));
  const minT=Math.max(1,maxT-2);
  return ri(minT,maxT);
}
function potionVariant(family,eff){
  const fam=POTION_FAMILIES[family];
  if(!fam)return null;
  const tier=potionTierForLvl(eff,fam.variants.length);
  return fam.variants.find(v=>v.tier===tier)||fam.variants[Math.min(fam.variants.length-1,tier-1)];
}
function potionScaledFx(variant,eff=0){
  if(!variant)return{};
  const s=1+Math.min(0.35,eff*0.04);
  const fx={};
  if(variant.heal)fx.heal=Math.round(variant.heal*s);
  if(variant.heat)fx.heat=Math.round(variant.heat*s*100)/100;
  if(variant.attack)fx.attack=Math.round(variant.attack*s);
  if(variant.defense)fx.defense=Math.round(variant.defense*s);
  if(variant.sight)fx.sight=Math.round(variant.sight*s);
  if(variant.duration)fx.duration=Math.round(variant.duration*(1+eff*0.03));
  if(variant.regen)fx.regen=Math.round(variant.regen*s);
  if(variant.skillXP)fx.skillXP=variant.skillXP+(eff>=8?1:0);
  if(fx.skillXP)fx.skillPool=NEURAL_SKILL_POOL;
  return fx;
}
function potionFx(it){
  if(!it||it.kind!=='potion')return null;
  if(it.potionFamily&&it.potionTier){
    const v=POTION_FAMILIES[it.potionFamily]?.variants.find(x=>x.tier===it.potionTier);
    if(v)return potionScaledFx(v,it.potionLvl||0);
  }
  return null;
}
function potionEffectPreview(it){
  const fx=potionFx(it);
  if(!fx)return null;
  const heal=(fx.heal||0)+(it.healBonus||0);
  const bits=[];
  if(heal)bits.push(`heal ${heal}`);
  if(fx.skillXP)bits.push(`skill insight ×${fx.skillXP}`);
  if(fx.heat)bits.push(`heat ${fx.heat>0?'+':''}${fx.heat}`);
  if(fx.duration)bits.push(`${fx.duration}t`);
  if(fx.attack)bits.push(`atk +${fx.attack}`);
  if(fx.defense)bits.push(`def +${fx.defense}`);
  if(fx.sight)bits.push(`see +${fx.sight}`);
  if(fx.regen)bits.push(`regen ${fx.regen}`);
  return bits.join(', ');
}
function mkPotionFromFamily(family,eff=0){
  const fam=POTION_FAMILIES[family];
  const variant=potionVariant(family,eff);
  if(!fam||!variant)return mkPotion(eff);
  const tierVal=variant.tier;
  const qual=tierVal>=6?'fine':tierVal>=4?'sturdy':'common';
  const rar=variant.rar||'common';
  const fx=potionScaledFx(variant,eff);
  const baseCp={common:90,uncommon:140,rare:220,epic:320,legendary:480}[rar]||100;
  return mkItem({char:'*',name:variant.name,kind:'potion',quality:qual,rarity:rar,weight:0.4,
    desc:fam.desc,potionFamily:family,potionTier:variant.tier,potionLvl:eff,
    healBonus:fx.heal?Math.floor(eff*1.2):0,valueCp:itemValueCp(baseCp,rar,qual,eff,tierVal*18)});
}
function mkPotion(lvl=0){
  const eff=effectiveThreatLvl(lvl);
  const pool=POTION_FAMILY_ORDER.map(id=>({id,w:POTION_FAMILIES[id].weight}));
  let roll=rf()*pool.reduce((s,p)=>s+p.w,0),pick=pool[0].id;
  for(const p of pool){roll-=p.w;if(roll<=0){pick=p.id;break;}}
  return mkPotionFromFamily(pick,eff);
}

function storyDiffLines(){
  const d=G.difficulty||'normal';
  return[STORY_DIFF[d],STORY_DIFF[d+'2'],STORY_DIFF[d+'3']].filter(Boolean);
}
function buildStoryBriefing(){
  const arch=G.archetype||'netrunner';
  const label=ARCHETYPES[arch]?.label||arch;
  return[
    `Operative: ${label}`,
    `Difficulty: ${(G.difficulty||'normal').toUpperCase()}`,
    '---',
    'The Black Keep never finished modernizing.',
    'Barons swear oaths on steel; seneschals swear oaths on SSH.',
    'Guards wear plate and carry poleaxes because the deep strata',
    'jams radio and swallow signal. Guild contractors — ARTHACK —',
    'carry both: haversacks, blades, and portable rigs that speak',
    'CastleNet on door runes, vault SSIDs, and scada saints.',
    '---',
    'WHY YOU ARE HERE:',
    ...(STORY_ARCH[arch]||STORY_ARCH.netrunner),
    '---',
    'THE JOB:',
    'Climb the strata. Reach the surface gate >.',
    'Get out alive — that is the contract.',
    '---',
    'STAKES:',
    ...storyDiffLines(),
    '---',
    '[ Enter / BEGIN to descend ]'
  ];
}
function drawStory(){
  const lines=buildStoryBriefing();
  const pg=Math.max(6,overlayListPageSize(2,2));
  const maxScroll=Math.max(0,lines.length-pg);
  G.storyScroll=Math.max(0,Math.min(G.storyScroll||0,maxScroll));
  const vis=lines.slice(G.storyScroll,G.storyScroll+pg);
  let row=overlayText([['═══ ARTHACK — BRIEFING ═══',M.lav,15],['---']]);
  for(const ln of vis){
    let col=M.txt;
    if(ln==='---')col=M.s1;
    else if(ln.startsWith('Act '))col=M.yel;
    else if(ln.startsWith('WHY')||ln.startsWith('THE JOB')||ln.startsWith('STAKES'))col=M.tea;
    else if(ln.startsWith('['))col=M.grn;
    else if(ln.startsWith('Operative')||ln.startsWith('Difficulty'))col=M.lav;
    row=overlayText([[ln,col,2]],2,row);
  }
  if(lines.length>pg){
    overlayText([[`Briefing ${G.storyScroll+1}-${Math.min(lines.length,G.storyScroll+pg)}/${lines.length} · PgUp/Dn scroll`,M.s1,2]],2,row);
  }
  overlayText([['Enter / BEGIN — step into the keep',M.sub,2]],2,row+1);
}
function handleStoryKey(e){
  const lines=buildStoryBriefing();
  const pg=Math.max(6,overlayListPageSize(2,2));
  const maxScroll=Math.max(0,lines.length-pg);
  if(e.key==='ArrowUp'||e.key==='k')G.storyScroll=Math.max(0,(G.storyScroll||0)-1);
  else if(e.key==='ArrowDown'||e.key==='j')G.storyScroll=Math.min(maxScroll,(G.storyScroll||0)+1);
  else if(e.key==='PageUp')G.storyScroll=Math.max(0,(G.storyScroll||0)-pg);
  else if(e.key==='PageDown'||e.key===' ')G.storyScroll=Math.min(maxScroll,(G.storyScroll||0)+pg);
  else if(e.key==='Home')G.storyScroll=0;
  else if(e.key==='End')G.storyScroll=maxScroll;
  else if(e.key==='Enter'){confirmStory();return;}
  else if(e.key==='Escape'){G.overlay='difficulty';render();return;}
  render();
}
function confirmStory(){
  const arch=ARCHETYPES[G.archetype];
  addLog(`Difficulty: ${G.difficulty}.`,M.yel);
  addLog(`Briefing: ${arch?.label||G.archetype} — ${(STORY_ARCH[G.archetype]||STORY_ARCH.netrunner)[0]}`,M.lav);
  G.journal.unshift(`BRIEF [${G.difficulty}]: ${arch?.label} — climb to the surface gate.`);
  G.overlay=null;
  startRun();
}

function buildReturnReveal(){
  return[
    '═══ GATE BREACHED ═══',
    '---',
    'You made it out. Cold air. Then the syndicate handler',
    'meets you on the rampart with orders you were not briefed on.',
    '---',
    'The surface gate > is welded shut behind you.',
    'Extraction is not that simple.',
    '---',
    'NEW ORDERS — RETURN RUN:',
    'Re-enter through the West Sally Port — a different wing,',
    'a different breach path than the strata you just climbed.',
    'The keep has been re-keyed overnight; the board is new.',
    '---',
    'Descend into the deep strata again.',
    'Somewhere below is a portal (O) that punches home.',
    'Find three charter fragments * scattered in the dark.',
    'Arm the portal. Then run.',
    '---',
    '[ Enter / DESCEND to begin the deep run ]'
  ];
}
function drawReturnReveal(){
  const lines=buildReturnReveal();

    else if(ln.startsWith('['))col=M.grn;
    else if(ln.startsWith('═══'))col=M.lav;
    row=overlayText([[ln,col,2]],2,row);
  }
  if(lines.length>pg){
    overlayText([[`Orders ${G.returnRevealScroll+1}-${Math.min(lines.length,G.returnRevealScroll+pg)}/${lines.length} · PgUp/Dn`,M.s1,2]],2,row);
  }
  overlayText([['Enter / DESCEND — step into the West Sally Port',M.sub,2]],2,row+1);
}
function handleReturnRevealKey(e){
  const lines=buildReturnReveal();
  const pg=Math.max(6,overlayListPageSize(2,2));
  const maxScroll=Math.max(0,lines.length-pg);
  if(e.key==='ArrowUp'||e.key==='k')G.returnRevealScroll=Math.max(0,(G.returnRevealScroll||0)-1);
  else if(e.key==='ArrowDown'||e.key==='j')G.returnRevealScroll=Math.min(maxScroll,(G.returnRevealScroll||0)+1);
  else if(e.key==='PageUp')G.returnRevealScroll=Math.max(0,(G.returnRevealScroll||0)-pg);
  else if(e.key==='PageDown'||e.key===' ')G.returnRevealScroll=Math.min(maxScroll,(G.returnRevealScroll||0)+pg);

const RAYS=[];
for(let i=0;i<720;i++){const a=2*Math.PI*i/720;RAYS.push([Math.cos(a),Math.sin(a)]);}
const OPAQUE=new Set(['#','=']);

//  Level state (current level)
// ══════════════════════════════════════════════════════════════
let grid=[],rooms=[],items={},entities={},doors={},specials={},seen=new Set(),visible=new Set();

let levelStore=[];
let dungeonAct='escape'; // 'escape' | 'return' — controls gate/portal/clue placement during gen
let stairLinks={};

function mkGrid(){return Array.from({length:WH},()=>Array(WW).fill(VOID));}
function setc(g,x,y,c){if(x>=0&&x<WW&&y>=0&&y<WH)g[y][x]=c;}
function getc(g,x,y){if(x<0||x>=WW||y<0||y>=WH)return VOID;return g[y][x];}

const BLOCK=new Set(['#','=',' ']);

// ── Dungeon generation ────────────────────────────────────────
function stampBox(g,x0,y0,w,h){
  for(let j=0;j<h;j++)for(let i=0;i<w;i++){
    const edge=i===0||j===0||i===w-1||j===h-1;
    setc(g,x0+i,y0+j,edge?'#':'.');
  }
}

function roomWallAt(rms,x,y){
  return rms.find(r=>x>=r.x0&&x<r.x0+r.w&&y>=r.y0&&y<r.y0+r.h&&
    (x===r.x0||x===r.x0+r.w-1||y===r.y0||y===r.y0+r.h-1))||null;
}
function corridorCell(g,drs,rms,x,y){
  if(x<0||x>=WW||y<0||y>=WH)return;
  const c=getc(g,x,y);
  if(c===VOID){setc(g,x,y,'.');}
  else if(c==='#'){
    const rm=roomWallAt(rms,x,y);
    const key=`${x},${y}`;
    setc(g,x,y,'+');
    if(!drs[key]){drs[key]={locked:false,desc:'doorway',explored:true,room:rm?rm.id:''};}
  }
}
function hcor(g,drs,rms,x1,x2,y){for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++){corridorCell(g,drs,rms,x,y);if(rf()<0.07)corridorCell(g,drs,rms,x,y+(ri(0,1)?1:-1));}}
function vcor(g,drs,rms,x,y1,y2){for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++){corridorCell(g,drs,rms,x,y);if(rf()<0.07)corridorCell(g,drs,rms,x+(ri(0,1)?1:-1),y);}}

function corridorBetween(g,drs,rms,r1,r2){
  // Route center-to-center through interior floor cells; corridorCell punches
  // doors through any walls encountered, so no corner-blocking can disconnect rooms.
  const cx1=r1.x0+Math.floor(r1.w/2),cy1=r1.y0+Math.floor(r1.h/2);
  const cx2=r2.x0+Math.floor(r2.w/2),cy2=r2.y0+Math.floor(r2.h/2);
  if(rf()<0.5){hcor(g,drs,rms,cx1,cx2,cy1);vcor(g,drs,rms,cx2,cy1,cy2);}
  else{vcor(g,drs,rms,cx1,cy1,cy2);hcor(g,drs,rms,cx1,cx2,cy2);}
}

function floorCells(g,r){
  const f=[];
  for(let y=r.y0+1;y<r.y0+r.h-1;y++)for(let x=r.x0+1;x<r.x0+r.w-1;x++)if(getc(g,x,y)==='.')f.push([x,y]);
  return f;
}

function nearestRoomCenter(rms,x,y){
  let best=null,bd=1e9;
  for(const r of rms){const cx=r.x0+Math.floor(r.w/2),cy=r.y0+Math.floor(r.h/2),d=Math.abs(cx-x)+Math.abs(cy-y);if(d<bd){bd=d;best={cx,cy,r};}}
  return best;
}

function fhex(n){return Array.from({length:n},()=>ri(0,15).toString(16)).join('').toUpperCase();}

let _rid=0;
function genLevel(lvlNum){
  const g=mkGrid(),rms=[],drs={},sps={};
  const growth=1.3**lvlNum,zgrow=1.16**lvlNum;
  const zcols=Math.min(Math.max(ZONE_COLS,Math.round(ZONE_COLS*zgrow)),Math.max(6,Math.floor(WW/10)));
  const zrows=Math.min(Math.max(ZONE_ROWS,Math.round(ZONE_ROWS*zgrow)),Math.max(4,Math.floor(WH/8)));
  const zw=Math.floor(WW/zcols),zh=Math.floor(WH/zrows);
  const themes=[...THEMES[lvlNum%THEMES.length]];sh(themes);
  const rgrid=Array.from({length:zrows},()=>Array(zcols).fill(null));
  const rscale=Math.min(3.8,growth);
  let ti=0;
  for(let row=0;row<zrows;row++){
    for(let col=0;col<zcols;col++){
      const xmin=col*zw+2,xmax=Math.min(WW-2,(col+1)*zw-2);
      const ymin=row*zh+2,ymax=Math.min(WH-2,(row+1)*zh-2);
      if(xmax-xmin<6||ymax-ymin<5)continue;
      let rw=ri(Math.max(6,Math.floor(zw*0.44)),Math.max(7,Math.floor(zw*0.72)));
      let rh=ri(Math.max(5,Math.floor(zh*0.42)),Math.max(6,Math.floor(zh*0.70)));
      rw=Math.min(Math.floor(rw*Math.min(1.2,0.9+0.06*rscale)),26,xmax-xmin-1);
      rh=Math.min(Math.floor(rh*Math.min(1.2,0.9+0.06*rscale)),16,ymax-ymin-1);
      if(rw<5||rh<4)continue;
      const x0=ri(xmin,Math.max(xmin,xmax-rw));
      const y0=ri(ymin,Math.max(ymin,ymax-rh));
      const id=`l${lvlNum}r${col}_${row}`;
      const name=themes[ti++%themes.length];
      stampBox(g,x0,y0,rw,rh);
      const r={id,name,x0,y0,w:rw,h:rh};
      rms.push(r);rgrid[row][col]=r;
    }
  }
  // Fallback single room
  if(!rms.length){
    const rw=Math.min(WW-4,Math.max(8,Math.floor(12*Math.min(3.8,growth))));
    const rh=Math.min(WH-4,Math.max(6,Math.floor(7*Math.min(3.8,growth))));
    const x0=Math.max(2,Math.floor((WW-rw)/2)),y0=Math.max(2,Math.floor((WH-rh)/2));
    stampBox(g,x0,y0,rw,rh);
    const r={id:`l${lvlNum}r0_0`,name:ch(themes),x0,y0,w:rw,h:rh};
    rms.push(r);rgrid[0]=[r,...Array(zcols-1).fill(null)];
  }
  // Connect zones
  for(let row=0;row<zrows;row++)for(let col=0;col<zcols;col++){
    const r1=rgrid[row][col];if(!r1)continue;
    if(col+1<zcols&&rgrid[row][col+1])corridorBetween(g,drs,rms,r1,rgrid[row][col+1]);
    if(row+1<zrows&&rgrid[row+1][col])corridorBetween(g,drs,rms,r1,rgrid[row+1][col]);
  }
  // Extra random connections
  for(let i=0;i<3;i++)if(rms.length>=2){const[a,b]=sm(rms,2);corridorBetween(g,drs,rms,a,b);}
  // Infill small rooms
  const target=ri(28,48)+Math.floor(18*growth);
  let added=0,tries=0;
  while(added<target&&tries<1200){
    tries++;
    const w=rf()<0.2?ri(9,14):ri(6,11),h=rf()<0.2?ri(6,10):ri(4,8);
    const x0=ri(2,WW-w-3),y0=ri(2,WH-h-3);
    let free=true;
    outer:for(let y=y0;y<y0+h;y++)for(let x=x0;x<x0+w;x++){if(getc(g,x,y)!==VOID){free=false;break outer;}}
    if(!free)continue;
    const near=nearestRoomCenter(rms,x0+Math.floor(w/2),y0+Math.floor(h/2));
    if(!near||Math.abs(near.cx-(x0+Math.floor(w/2)))+Math.abs(near.cy-(y0+Math.floor(h/2)))>52)continue;
    stampBox(g,x0,y0,w,h);
    const rid=`l${lvlNum}s${added}_${tries}`;
    const nr={id:rid,name:ch(["Closet","Cache","Antechamber","Hideout","Niche","Store Nook"]),x0,y0,w,h};
    rms.push(nr);
    corridorBetween(g,drs,rms,nr,near.r);
    added++;
  }
  // Surface gate on final level (escape act only)
  if(lvlNum===NUM_LEVELS-1&&dungeonAct==='escape'){
    const gr=rgrid[0]?rgrid[0][zcols-1]||rms[rms.length-1]:rms[rms.length-1];
    if(gr){const gx=gr.x0+Math.floor(gr.w/2),gy=gr.y0+1;setc(g,gx,gy,'>');sps[`${gx},${gy}`]={kind:'gate'};}
  }
  // Portal in deep strata (return act only — sealed until clues found)
  if(lvlNum===0&&dungeonAct==='return'){
    const pr=rms.find(r=>r.id===`l${lvlNum}r0_0`)||rms[0];
    if(pr){
      const pf=floorCells(g,pr).filter(([x,y])=>!sps[`${x},${y}`]&&getc(g,x,y)==='.');
      if(pf.length){const[px,py]=ch(pf);setc(g,px,py,'O');sps[`${px},${py}`]={kind:'portal'};}
    }
  }
  // West sally entry wing on return surface level
  if(lvlNum===NUM_LEVELS-1&&dungeonAct==='return'){
    const west=rms.reduce((best,r)=>!best||r.x0<best.x0?r:best,null);
    if(west)west.name='West Sally Port';
  }
  // Starting room id fix
  if(!rms.find(r=>r.id===`l${lvlNum}r0_0`)&&rms.length)rms[0].id=`l${lvlNum}r0_0`;
  return{g,rms,drs,sps,lvlNum};
}

function populateLevel(snap){
  const{g,rms,drs,sps,lvlNum}=snap;
  const itms={},ents={};
  sh(rms);
  // Starting room guaranteed
  const startRm=rms.find(r=>r.id===`l${lvlNum}r0_0`)||rms[0];

  // Enemies
  const pool=lvlNum>=2?ENT_POOL:ENT_POOL.slice(0,10);
  const nents=Math.max(4,NUM_LEVELS+3-lvlNum);
  for(let i=0;i<nents;i++){
    const room=rms[i%rms.length];
    const f=floorCells(g,room);
    if(!f.length)continue;
    const [ex,ey]=ch(f);
    const [echar,ename,edesc,esight,ehp,eatk,earm]=ch(pool);
    const eid=`en${++_rid}`;
    ents[eid]={id:eid,x:ex,y:ey,char:echar,name:ename,desc:edesc,
      hostile:true,sight:esight,alerted:false,alertTimer:0,
      hp:ehp,maxHp:ehp,atk:eatk,arm:earm,baseHp:ehp,baseAtk:eatk,baseArm:earm,
      patrolA:[ex,ey],patrolB:[ex,ey],patrolStep:0};
  }

  // Lock 35-50% of non-explored doors
  const doorList=Object.entries(drs).filter(([,d])=>!d.locked&&!d.explored);
  sh(doorList);
  const nlock=Math.max(2,Math.floor(doorList.length*ri(35,50)/100));
  for(let i=0;i<Math.min(nlock,doorList.length);i++){
    const[dkey,dinfo]=doorList[i];
    dinfo.locked=true;
    const[dx,dy]=dkey.split(',').map(Number);
    setc(g,dx,dy,'=');
    // Drop a key in a different room
    const krooms=rms.filter(r=>r.id!==dinfo.room)||rms;
    const kr=ch(krooms);
    const kf=floorCells(g,kr);
    if(kf.length){
      const[kx,ky]=ch(kf);
      const kid=`it${++_seq}`;
      itms[kid]={...mkItem({char:'k',name:'iron key',desc:'opens a heavy lock',kind:'key',weight:0.5,valueCp:40}),id:kid,x:kx,y:ky};
      setc(g,kx,ky,'k');
    }
  }

  // Trapdoors on levels 1+
  if(lvlNum>0){
    for(let i=0;i<ri(1,2);i++){
      const room=ch(rms);const f=floorCells(g,room);
      if(f.length){const[tx,ty]=ch(f);setc(g,tx,ty,'T');sps[`${tx},${ty}`]={kind:'trapdoor',targetLevel:lvlNum-1};}
    }
  }

  // Terminals
  const ctrlBasic=['doors','locks','loot','gates','dungeon','security'];
  const ctrlMid=['cameras','alarms','comm','vault','power','db'];
  const ctrlAdv=['auth','scada','radio','firmware','backup','cloud'];
  const ctrlApex=['registry','webshell','vpn','container'];
  let ctrlPool=lvlNum<2?ctrlBasic:lvlNum<5?[...ctrlBasic,...ctrlMid]:lvlNum<7?[...ctrlBasic,...ctrlMid,...ctrlAdv]:[...ctrlBasic,...ctrlMid,...ctrlAdv,...ctrlApex];
  const tcands=[...rms];sh(tcands);
  const nterms=Math.max(3,Math.floor((rms.length+1)/2));
  const termSpecs=[];
  let tidx=0;
  for(let i=0;i<nterms;i++){
    const room=tcands[tidx++%tcands.length];
    const f=floorCells(g,room).filter(([x,y])=>!sps[`${x},${y}`]);
    if(!f.length)continue;
    const[tx,ty]=ch(f);
    const ctrl=ch(ctrlPool);
    const ssid=`CastleNet-${lvlNum}-${i+1}`;
    const tier=Math.max(1,Math.min(3,1+Math.floor(lvlNum/2)));
    setc(g,tx,ty,'!');
    const hp=lvlNum>=1?rf()<0.12:false;
    const bm=!hp&&lvlNum>=1&&rf()<0.05;
    sps[`${tx},${ty}`]={kind:'terminal',ssid,control:ctrl,tier,hacked:false,honeypot:hp,botnet:false,blackMarket:bm,ports:[],
      mac:genMac(),ip:terminalIP(ctrl,lvlNum),hostname:terminalHostname(ctrl,i+1),
      credUnlocked:false,credSource:null,_secretExtracted:false};
    termSpecs.push([tx,ty,ssid,tier]);
  }

  // Tutorial terminal in escape start room only
  if(lvlNum===0&&dungeonAct==='escape'&&startRm){
    const tf=floorCells(g,startRm).filter(([x,y])=>!sps[`${x},${y}`]);
    if(tf.length){
      const[tx,ty]=tf[0];
      setc(g,tx,ty,'!');
      sps[`${tx},${ty}`]={kind:'terminal',ssid:'CastleNet-TUTORIAL',control:'doors',tier:1,hacked:false,honeypot:false,botnet:false,tutorial:true,ports:[],
        mac:genMac(),ip:terminalIP('doors',0),hostname:'DCTRL-00',
        credUnlocked:false,credSource:null,_secretExtracted:false};
    }
  }

  // Wire terminal security (lock nearby doors)
  for(const[tx,ty,ssid,tier] of termSpecs){
    const cdoors=Object.entries(drs).filter(([k,d])=>{
      const[dx,dy]=k.split(',').map(Number);
      return Math.abs(dx-tx)+Math.abs(dy-ty)<=20&&!d.explored&&!d.hack_ssid;
    });
    sh(cdoors);
    for(let i=0;i<Math.min(ri(2,4),cdoors.length);i++){
      const[dk,di]=cdoors[i];
      di.locked=true;di.hack_locked=true;di.hack_ssid=ssid;
      const[dx,dy]=dk.split(',').map(Number);setc(g,dx,dy,'=');
    }
    // Hack chests near terminal
    const room=rms.find(r=>tx>=r.x0&&tx<r.x0+r.w&&ty>=r.y0&&ty<r.y0+r.h);
    if(room){
      const cf=floorCells(g,room).filter(([x,y])=>!sps[`${x},${y}`]&&!(x===tx&&y===ty));
      sh(cf);
      const nc=ri(2,3);
      for(let i=0;i<Math.min(nc,cf.length);i++){
        const[cx,cy]=cf[i];
        setc(g,cx,cy,'&');
        sps[`${cx},${cy}`]={kind:'hack_chest',ssid,locked:true,wasLocked:true,
          lootDrops:lvlNum>=5?2:1,lootLvl:lvlNum};
      }
    }
  }

  // Shop
  const shopRoom=lvlNum===0?(rms.find(r=>r.id===`l0r0_0`)||ch(rms)):ch(rms);
  {const f=floorCells(g,shopRoom).filter(([x,y])=>!sps[`${x},${y}`]);
   if(f.length){const[sx,sy]=ch(f);setc(g,sx,sy,'%');sps[`${sx},${sy}`]={kind:'shop',name:`Level ${lvlNum} Quartermaster`,stock:shopStock(lvlNum),nextRestock:ri(30,90)};}}

  // Crafting stations
  const stHosts=lvlNum===0?[startRm,startRm]:sm(rms,Math.min(2,rms.length));
  const usedCells=new Set();
  for(const[stKind,stRoom] of [['anvil',stHosts[0]],['table',stHosts[1]]].filter(([,r])=>r)){
    const f=floorCells(g,stRoom).filter(([x,y])=>getc(g,x,y)==='.'&&!sps[`${x},${y}`]&&!usedCells.has(`${x},${y}`));
    if(f.length){const[cx,cy]=ch(f);usedCells.add(`${cx},${cy}`);const gl=stKind==='anvil'?'A':'F';setc(g,cx,cy,gl);sps[`${cx},${cy}`]={kind:'station',station:stKind};}
  }

  // Small satchel in escape start room (level 0)
  if(lvlNum===0&&dungeonAct==='escape'&&startRm){
    const f=floorCells(g,startRm).filter(([x,y])=>getc(g,x,y)==='.'&&!sps[`${x},${y}`]);
    if(f.length){const[sx,sy]=ch(f);const bp={...BPACKS[0],id:`it${++_seq}`,x:sx,y:sy};itms[bp.id]=bp;setc(g,sx,sy,'[');}
  }

  // Loot in every room + loot chests
  for(const room of rms){
    const f=floorCells(g,room).filter(([x,y])=>getc(g,x,y)==='.'&&!sps[`${x},${y}`]);
    sh(f);
    const floorLootN=ri(Math.max(1,2-Math.floor(lvlNum/5)),Math.max(2,4-Math.floor(lvlNum/6)));
    for(let i=0;i<floorLootN&&f.length;i++){
      const[lx,ly]=f.pop();
      const stub=mkLootStub(lx,ly,lvlNum,'floor');
      itms[stub.id]=stub;setc(g,lx,ly,'$');
    }
    if(f.length&&rf()<0.85){
      const[cx,cy]=f.pop();
      setc(g,cx,cy,'X');
      sps[`${cx},${cy}`]={kind:'loot_chest',lootDrops:lootChestDropCount(lvlNum),lootLvl:lvlNum,opened:false};
    }
  }

  // Clues scattered during return act only
  if(dungeonAct==='return'){
    const cluerooms=sm(rms,Math.min(2,rms.length));
    for(const r of cluerooms){
      if(rf()<0.35){
        const f=floorCells(g,r).filter(([x,y])=>getc(g,x,y)==='.');
        if(f.length){const[cx,cy]=ch(f);const it=mkItem({char:'*',name:'scrap of parchment',desc:ch(CLUE_NOTES),kind:'clue',weight:0.1,valueCp:20});it.id=`it${++_seq}`;it.x=cx;it.y=cy;itms[it.id]=it;setc(g,cx,cy,'*');}
      }
    }
  }

  snap.itms=itms;snap.ents=ents;
}

function buildLevelStore(act='escape'){
  const prevAct=dungeonAct;
  dungeonAct=act;
  levelStore=[];stairLinks={};_rid=0;
  clearPackedLevelCache();
  // Known travel spots reference the old level set — clear them on a rebuild.
  G.travel={shop:null,anvil:null,table:null};G.travelConfirm=null;
  for(let l=0;l<NUM_LEVELS;l++){
    const snap=genLevel(l);
    populateLevel(snap);
    levelStore.push({grid:snap.g,rooms:snap.rms,items:snap.itms,entities:snap.ents,doors:snap.drs,specials:snap.sps,seen:new Set(),visible:new Set()});
  }
  placeAllStairs();
  dungeonAct=prevAct;
}

function loadEscapeStart(){
  const s0=levelStore[0];
  grid=s0.grid.map(r=>[...r]);rooms=[...s0.rooms];
  items={...s0.items};entities={...s0.entities};
  doors={...Object.fromEntries(Object.entries(s0.doors).map(([k,v])=>[k,{...v}]))};
  specials={...Object.fromEntries(Object.entries(s0.specials).map(([k,v])=>[k,{...v}]))};
  seen=new Set();visible=new Set();
  G.level=0;
  const startRoom=rooms.find(r=>r.id==='l0r0_0')||rooms[0];
  if(startRoom){
    const f=floorCells(grid,startRoom);
    if(f.length){[G.px,G.py]=f[0];}
    else{[G.px,G.py]=[startRoom.x0+1,startRoom.y0+1];}
  }
  initEnemyPatrols();
}

function loadReturnEntry(){
  const top=NUM_LEVELS-1;
  const snap=levelStore[top];
  if(!snap){loadEscapeStart();return;}
  grid=snap.grid.map(r=>[...r]);rooms=[...snap.rooms];
  items={...snap.items};entities={...snap.entities};
  doors={...Object.fromEntries(Object.entries(snap.doors).map(([k,v])=>[k,{...v}]))};
  specials={...Object.fromEntries(Object.entries(snap.specials).map(([k,v])=>[k,{...v}]))};
  seen=new Set();visible=new Set();
  G.level=top;
  const entryRoom=rooms.find(r=>r.name==='West Sally Port')||
    rooms.reduce((best,r)=>!best||r.x0<best.x0?r:best,null);
  if(entryRoom){
    const f=floorCells(grid,entryRoom).filter(([x,y])=>!entityAt(x,y));
    if(f.length){[G.px,G.py]=ch(f);}
    else{[G.px,G.py]=[entryRoom.x0+1,entryRoom.y0+1];}
  }
  initEnemyPatrols();
  addLog('You enter through the West Sally Port — not the strata you climbed.',M.lav);
  addLog('The surface gate is sealed. Descend. Somewhere below is a portal home.',M.tea);
}

function completeEscapeAct(){
  G.escaped=true;
  G.phase='return';
  G.clues=0;
  G.portalArmed=false;
  addLog('You breach the surface gate — cold night air at last.',M.grn);
  bumpStoryEscalation(`Story strain rises to ${storyTier()} — the castle seals behind you.`);
  _s=(_s+0x9E3779B9)|0;
  NUM_LEVELS=ri(8,12);
  buildLevelStore('return');
  loadReturnEntry();
  generateContracts();
  G.journal.unshift('ESCAPE: broke the surface gate — syndicate orders a return through the sally port.');
  G._lastStoryTier=storyTier();
  G.overlay='return_reveal';
  G.returnRevealScroll=0;
  computeVisible(visionRadius());
}

function snapshot(){
  return{
    grid:grid.map(r=>[...r]),
    rooms:[...rooms],
    items:{...items},
    entities:{...entities},
    doors:{...Object.fromEntries(Object.entries(doors).map(([k,v])=>[k,{...v}]))},
    specials:{...Object.fromEntries(Object.entries(specials).map(([k,v])=>[k,{...v}]))},
    seen:new Set(seen),
    visible:new Set()
  };
}
function restoreSnap(snap){
  grid=snap.grid.map(r=>[...r]);
  rooms=[...snap.rooms];
  items={...snap.items};
  entities={...snap.entities};
  doors={...Object.fromEntries(Object.entries(snap.doors).map(([k,v])=>[k,{...v}]))};
  specials={...Object.fromEntries(Object.entries(snap.specials).map(([k,v])=>[k,{...v}]))};
  seen=new Set(snap.seen);
  visible=new Set();
}

function placeAllStairs(){
  for(let l=0;l<NUM_LEVELS-1;l++){
    const lo=levelStore[l],hi=levelStore[l+1];
    if(!lo||!hi)continue;
    const loRooms=lo.rooms.filter(r=>r.id!==`l0r0_0`||l>0);
    if(!loRooms.length)continue;
    const loRoom=ch(loRooms);
    const loFloor=floorCells(lo.grid,loRoom);
    if(!loFloor.length)continue;
    const[lx,ly]=ch(loFloor);
    const hiRoom=ch(hi.rooms);
    const hiFloor=floorCells(hi.grid,hiRoom);
    if(!hiFloor.length)continue;
    const[hx,hy]=ch(hiFloor);
    lo.grid[ly][lx]='<';
    lo.specials[`${lx},${ly}`]={kind:'stairs_up',targetLevel:l+1,targetX:hx,targetY:hy};
    stairLinks[`${l}:${lx},${ly}`]={dir:'up',targetLevel:l+1,targetX:hx,targetY:hy};
    hi.grid[hy][hx]='V';
    hi.specials[`${hx},${hy}`]={kind:'stairs_down',targetLevel:l,targetX:lx,targetY:ly};
    stairLinks[`${l+1}:${hx},${hy}`]={dir:'down',targetLevel:l,targetX:lx,targetY:ly};
  }
}

function generateDungeon(){
  buildLevelStore('escape');
  loadEscapeStart();
}

function initEnemyPatrols(){
  for(const e of Object.values(entities)){
    if(!e.hostile||e.isResponder)continue;
    scaleEnemy(e);
    const r=rooms.find(r=>e.x>=r.x0&&e.x<r.x0+r.w&&e.y>=r.y0&&e.y<r.y0+r.h);
    if(!r)continue;
    const f=floorCells(grid,r).filter(([x,y])=>!(x===e.x&&y===e.y));
    if(f.length){
      const far=f.reduce((best,p)=>Math.abs(p[0]-e.x)+Math.abs(p[1]-e.y)>Math.abs(best[0]-e.x)+Math.abs(best[1]-e.y)?p:best,f[0]);
      e.patrolA=[e.x,e.y];e.patrolB=[...far];e.patrolStep=0;
    }
  }
}

function computeVisible(radius){
  const px=G.px,py=G.py;
  const vis=new Set([`${px},${py}`]);
  for(const[ca,sa] of RAYS){
    for(let r=1;r<=radius;r++){
      const cx=Math.round(px+ca*r),cy=Math.round(py+sa*r);
      if(cx<0||cx>=WW||cy<0||cy>=WH)break;
      const cell=grid[cy][cx];
      if(cell===VOID)break;
      vis.add(`${cx},${cy}`);
      if(OPAQUE.has(cell))break;
    }
  }
  visible=vis;
  for(const k of vis)seen.add(k);
  recordKnownTravel();
}

function revealCurrentLevel(){
  for(let y=0;y<WH;y++)for(let x=0;x<WW;x++)if(getc(grid,x,y)!==VOID)seen.add(`${x},${y}`);
  recordKnownTravel();
}

// Remember the most recently discovered shop / anvil / crafting table so the
// travel panel can teleport back to them. "Last known" = latest level seen.
function recordKnownTravel(){
  for(const[key,sp] of Object.entries(specials)){
    if(!seen.has(key))continue;
    let type=null;
    if(sp.kind==='shop')type='shop';
    else if(sp.kind==='station'&&sp.station==='anvil')type='anvil';
    else if(sp.kind==='station'&&sp.station==='table')type='table';
    if(!type)continue;
    const[x,y]=key.split(',').map(Number);
    G.travel[type]={level:G.level,x,y};
  }
}
function cacheKnownTerminal(term){
  if(!term||term.x==null||term.y==null)return;
  const sp=specials[term.key];
  G.travel.terminal={level:G.level,x:term.x,y:term.y,hacked:!!sp?.hacked};
}

const LOG=[];
const LOG_MAX=5000;
const LOG_FILTERS=[
  {id:'all',label:'ALL'},
  {id:'terminal',label:'TERM'},
  {id:'secrets',label:'SEC'},
  {id:'world',label:'WORLD'}
];
function logFilterSpec(){return LOG_FILTERS[G.logFilterIdx||0]||LOG_FILTERS[0];}
function logEntryMatchesFilter(entry,filter){
  const msg=String(entry?.msg||'');
  if(filter==='all')return true;
  if(filter==='terminal')return /^\[CastleNet-/.test(msg)||/^\[term\]/.test(msg);
  if(filter==='secrets')return /SECRET FOUND|secret already|Unlocks instant|Unlocks \(|Already hold secret|Credential access|SECRET EXTRACTED/i.test(msg);
  if(filter==='world')return !logEntryMatchesFilter(entry,'terminal')&&!logEntryMatchesFilter(entry,'secrets');
  return true;
}
function filteredLog(){const f=logFilterSpec().id;return f==='all'?LOG:LOG.filter(e=>logEntryMatchesFilter(e,f));}
function cycleLogFilter(dir=1){
  G.logFilterIdx=(G.logFilterIdx+(dir>0?1:LOG_FILTERS.length-1))%LOG_FILTERS.length;
  const geo=logOverlayGeometry();
  const rows=logOverlayRows(geo.contentW);
  G.logScroll=Math.max(0,rows.length-geo.contentH);
}
function addLog(msg,color=M.txt){LOG.push({msg,color,turn:G.turnCount});if(LOG.length>LOG_MAX)LOG.shift();}
function terminalStatus(sp){
  if(!sp||sp.kind!=='terminal')return null;
  if(typeof initTerminalMeta==='function')initTerminalMeta(sp);
  if(sp.hacked)return{ch:'R',color:M.grn,tag:'root'};
  if(sp._secretExtracted)return{ch:'*',color:M.yel,tag:'secret'};
  if(sp.credUnlocked)return{ch:'+',color:M.tea,tag:'unlock'};
  return{ch:'!',color:M.blu,tag:'locked'};
}
function nearbyTerminalBrief(max=4,range=14){
  const out=[];
  for(const[k,sp] of Object.entries(specials)){
    if(sp.kind!=='terminal')continue;
    const[x,y]=k.split(',').map(Number);
    const d=Math.abs(x-G.px)+Math.abs(y-G.py);
    if(d>range)continue;
    const st=terminalStatus(sp);
    out.push({d,ssid:(sp.ssid||'?').replace('CastleNet-',''),st});
  }
  return out.sort((a,b)=>a.d-b.d).slice(0,max);
}

// ── Helper functions ──────────────────────────────────────────
function entityAt(x,y){for(const e of Object.values(entities))if(e.x===x&&e.y===y)return e;return null;}
function itemAt(x,y){const found=Object.values(items).filter(it=>it.x===x&&it.y===y);return found.length?found[found.length-1]:null;}
function isBlocked(x,y){if(x<0||x>=WW||y<0||y>=WH)return true;const c=grid[y][x];if(BLOCK.has(c))return true;if(entityAt(x,y))return true;return false;}

function visionRadius(){
  let r=VR;
  for(const e of G.activeEffects)if(e.type==='sight')r+=e.value;
  for(const it of equippedItems()){
    const st=itemEffectiveStats(it);
    if(st)r+=st.sight;
  }
  r+=consoleStatSum('sight');
  return Math.max(4,Math.min(30,r));
}

function playerAtk(){
  let a=2;
  for(const it of equippedItems()){
    const e=itemEffectiveStats(it);
    if(e)a+=e.attack;
  }
  a+=Math.floor(G.skills.melee/2);
  if(G.archetype==='combat_specialist')a+=2;
  if(G.archetype==='breach_striker')a+=3;
  for(const e of G.activeEffects)if(e.type==='attack')a+=e.value;
  return a;
}
function playerDef(){
  let d=0;
  for(const it of equippedItems()){
    const e=itemEffectiveStats(it);
    if(e)d+=e.defense;
  }
  for(const e of G.activeEffects)if(e.type==='defense')d+=e.value;
  return d;
}

function diffMult(){return{easy:0.85,normal:1.0,hard:1.20,nightmare:1.35}[G.difficulty]||1.0;}

function clampHeat(v){return Math.max(0,Math.min(5.0,v));}
function heatLevel(){return Math.min(5,Math.floor(G.heat));}
function setHeat(v){G.heat=clampHeat(v);G.heatPeak=Math.max(G.heatPeak||0,G.heat);}
function addHeat(v){setHeat(G.heat+v);}
function meterDelta(sign=1){
  const s=sign>=0?1:-1;
  return Math.round(s*(0.1+rf()*0.4)*10)/10;
}
function heatBump(sign=1){addHeat(meterDelta(sign));}
function fmtRep(v){const r=Math.round(v*10)/10;return(r>=0?'+':'')+r.toFixed(1);}

function skillLevelUpChance(level){
  return(level||0)>=7?0.10:0.20;
}
function addSkillXP(skill,xp=1){
  if(!G._skillXP)G._skillXP={melee:0,ranged:0};
  if(!G.skills.hasOwnProperty(skill))return;
  const gain=Math.max(1,Math.floor(xp*(G.xpMult||1)));
  for(let i=0;i<gain;i++){
    const lvl=G.skills[skill]||0;
    const chance=skillLevelUpChance(lvl);
    if(skill==='melee'||skill==='ranged'){
      G._skillXP[skill]=(G._skillXP[skill]||0)+1;
      if(G._skillXP[skill]>3)G._skillXP[skill]=3;
    }
    if(Math.random()<chance){
      G.skills[skill]=lvl+1;
      if(skill==='melee'||skill==='ranged')G._skillXP[skill]=0;
      addLog(`${skill[0].toUpperCase()+skill.slice(1)} Lv${G.skills[skill]}! (${Math.round(chance*100)}% roll)`,M.yel);
    }
  }
}

function addClue(text,source='clue'){
  if(!G.escaped)return;
  if(G.clues>=CLUES_NEEDED)return;
  G.clues++;
  const note=`CLUE: ${text||source}`;
  G.journal.push(note);
  addLog(`Found a clue! (${G.clues}/${CLUES_NEEDED}) "${String(text||source).slice(0,50)}"`,M.tea);
  bumpStoryEscalation(`Story strain rises to ${storyTier()} — hunters tighten the net.`);
  maybeArmPortal();
}

function maybeArmPortal(){
  if(G.phase==='return'&&G.clues>=CLUES_NEEDED&&!G.portalArmed){
    G.portalArmed=true;
    G.phase='portal';
    bumpStoryEscalation(`Story strain peaks at ${storyTier()} — the portal is armed.`);
    addLog('The clues align. The portal is armed — find O and go home.',M.mau);
  }
}

function adjustRep(delta,reason=''){
  if(!delta)return;
  const d=Math.abs(delta)<=0.51?delta:meterDelta(delta>=0?1:-1);
  G.rep=Math.round(Math.max(-10,Math.min(10,G.rep+d))*10)/10;
  const tag=d>=0?`+${d.toFixed(1)}`:d.toFixed(1);
  addLog(`[REP ${tag}] street cred now ${fmtRep(G.rep)}${reason?` (${reason})`:''}.`,d>0?M.grn:M.mar);
}

function repSightMod(){
  if(G.rep>=6)return -2;
  if(G.rep>=3)return -1;
  if(G.rep<=-6)return 2;
  if(G.rep<=-3)return 1;

}

function nearbyTerminalIntel(range=5){
  let best=null;
  for(const[k,sp] of Object.entries(specials)){
    if(sp.kind!=='terminal')continue;
    const[x,y]=k.split(',').map(Number);
    const d=Math.abs(x-G.px)+Math.abs(y-G.py);
    if(d<=range&&(!best||d<best.d))best={...sp,x,y,d};
  }

function stealthCut(){
  let cut=3+Math.floor(G.skills.evasion/4);

}
function inStealth(){return!!(G.stealthMode||(G.smokeUntil>G.turnCount));}
function breakStealth(msg){

function bearingLabel(px,py,tx,ty){
  const dx=tx-px,dy=ty-py;
  if(!dx&&!dy)return'HERE';
  const ang=Math.atan2(dy,dx)*180/Math.PI;
  const dirs=['E','SE','S','SW','W','NW','N','NE'];
  return dirs[((Math.round(ang/45)%8)+8)%8];
}

function scaleEnemy(ent){
  const key=`${G.difficulty}:${storyTier()}`;
  if(ent._scaledFor===key)return;
  const m=diffMult()*storyEnemyMult();
  const bhp=ent.baseHp||ent.maxHp||ent.hp||18;
  const batk=ent.baseAtk||ent.atk||6;
  const barm=ent.baseArm??ent.arm??1;
  const hpRatio=ent.maxHp?Math.max(0,Math.min(1,ent.hp/ent.maxHp)):1;
  ent.maxHp=Math.max(1,Math.round(bhp*m));
  ent.hp=Math.min(ent.maxHp,Math.max(1,Math.round(ent.maxHp*hpRatio)));
  ent.atk=Math.max(1,Math.round(batk*m));
  ent.arm=Math.max(0,Math.round(barm*m));
  ent._scaledFor=key;
}

function moduleForEnemy(name){
  const n=name.toLowerCase();
  if(n.includes('jailer'))return'keylog_implant';
  if(n.includes('skeleton')||n.includes('necromancer'))return'daemon_rootkit';
  if(n.includes('captain')||n.includes('mercenary'))return'override_bus';
  if(n.includes('guard'))return'process_mask';
  if(n.includes('hound')||n.includes('wolf'))return'arp_sweep_kit';
  if(n.includes('bat'))return'cam_jammer';
  if(n.includes('orc'))return'buffer_exploit';
  if(n.includes('rat'))return'sniffer_patch';
  return null;
}

function unlockModule(module, source){
  if(!module||G.modules.has(module))return;
  G.modules.add(module);
  const tool=MODULE_TO_TOOL[module];
  if(tool)G.tools.add(tool);
  addLog(`Recovered ${module} from ${source}.`,M.pch);
}

function awardKill(ent,cause='defeated'){
  G.stats.kills++;

  const coin=Math.floor((ri(22,75)+effectiveThreatLvl(G.level)*16+storyTier()*12)*diffMult())+(G.archetype==='combat_specialist'?ri(12,28+storyTier()*2):0);
  G.walletCp+=coin;
  unlockModule(moduleForEnemy(ent.name),ent.name);

    const[fx,fy]=freeNear(G.px,G.py);

  if(ent.id===G.responderID)G.responderID=null;

function visibleHostiles(){
  return Object.values(entities).filter(e=>e.hostile&&visible.has(`${e.x},${e.y}`));
}

function clearHeatIfNoVisibleHostiles(){

function rootedTerminals(){
  return Object.entries(specials)
    .filter(([,sp])=>sp.kind==='terminal'&&sp.hacked)
    .map(([key,sp])=>{const[x,y]=key.split(',').map(Number);return{key,x,y,sp};});

function terminalResource(control){return TERM_RES[control]||null;}

function resecureTerminal(t){
  const sp=specials[t.key];

// ── Canvas setup ──────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
// ── Viewport (real CSS pixels + device pixel ratio) ───────────
let DPR=window.devicePixelRatio||1;
let VPW=window.innerWidth,VPH=window.innerHeight;
// Game-view fit within the full-window canvas (centre + never-upscale clamp).
let GX=0,GY=0,GSCALE=1,G_GRIDW=0,G_GRIDH=0,LOGH=0;
const Viewport={update(){
  // The canvas is position:fixed;inset:0, so its own box equals the viewport that
  // the fixed control bands use — measure THAT (robust across browsers/headless).
  const r=canvas.getBoundingClientRect();
  const de=document.documentElement;
  VPW=Math.round(r.width||de.clientWidth||window.innerWidth||360);
  VPH=Math.round(r.height||de.clientHeight||window.innerHeight||640);
  DPR=window.devicePixelRatio||1;
}};

// ── Responsive layout tunables (Stage 12 QA) ──
const LAY={
  cellMin:9, cellMax:24, cellAspect:1.8,
  portColPx:15,                            // portrait: ~1 game column per N px width
  portRowsLog:10,
  landRows:14, landRowsLog:10,             // landscape game rows + log rows
  landSidePct:0.28, landSideMin:140, landSideMax:320,
  hudFontMin:10, hudFontMax:17,
  swipeDead:0.65,                         // × tile px — swipe vs tap / walk step
  ovScrollPx:1.15,                        // × HUD row px — overlay drag-scroll step
  tapSlop:0.65                            // × HUD row px — overlay tap vs scroll
};
const QA_MODE=new URLSearchParams(location.search).has('qa');
const clampN=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

// Pixel space taken by the fixed on-screen UI bands (incl. their safe-area
// padding, already baked into offsetHeight) + future side rails.
function reservedBands(){
  const ctxEl=document.getElementById('ctx-bar');
  const tuiEl=document.getElementById('touch-ui');
  const top=(ctxEl&&ctxEl.offsetHeight)||0;
  const bottom=(tuiEl&&tuiEl.offsetHeight)||0;
  return {top,bottom,left:0,right:0};
}

function setupLayout(){
  Viewport.update();
  if(VPW<1||VPH<1)return;
  CAN_W=VPW;CAN_H=VPH;
  IS_PORTRAIT=CAN_H>CAN_W;
  const band=reservedBands();
  const availW=Math.max(80,CAN_W-band.left-band.right);
  const availH=Math.max(80,CAN_H-band.top-band.bottom);

  if(IS_PORTRAIT){
    // Game cell sized from width; clamp to a legible px range.
    const cols=clampN(Math.round(availW/LAY.portColPx),18,46);
    CW=clampN(Math.floor(availW/cols),LAY.cellMin,LAY.cellMax);
    CH=Math.round(CW*LAY.cellAspect);
    VW=Math.max(12,Math.floor(availW/CW));
    SW=0;
    SCH=clampN(Math.round(CH*0.6),LAY.hudFontMin,LAY.hudFontMax);
    SCW=Math.max(6,Math.round(SCH*0.6));
    const sbRows=TOUCH_MODE?5:5; // gear stat line + compact HUD rows
    P_SB_H=sbRows*SCH;
    LH=LAY.portRowsLog;
    const minLog=LH*SCH;
    VH=Math.max(6,Math.floor((availH-P_SB_H-minLog)/CH));
    LOGH=Math.max(minLog,availH-P_SB_H-VH*CH); // log absorbs the vertical remainder
    G_GRIDW=VW*CW;
    G_GRIDH=VH*CH+P_SB_H+LOGH;                 // == availH (fills exactly)
  }else{
    // Landscape: rows drive cell height; reserve a sidebar (right) + log (below).
    LH=LAY.landRowsLog;
    CH=clampN(Math.floor(availH/(LAY.landRows+LH)),14,30);
    CW=clampN(Math.round(CH/LAY.cellAspect),LAY.cellMin,LAY.cellMax);
    SCH=clampN(Math.round(availH/34),LAY.hudFontMin,15);
    SCW=Math.max(6,Math.round(SCH*0.62));
    const sbPx=clampN(Math.round(availW*LAY.landSidePct),LAY.landSideMin,LAY.landSideMax);
    SW=Math.max(16,Math.floor(sbPx/CW));
    const gameW=availW-SW*CW;
    VW=Math.max(20,Math.floor(gameW/CW));
    const minLog=LH*CH;
    VH=Math.max(8,Math.floor((availH-minLog)/CH));
    LOGH=Math.max(minLog,availH-VH*CH);        // log absorbs the vertical remainder
    P_SB_H=0;
    G_GRIDW=(VW+SW)*CW;
    G_GRIDH=VH*CH+LOGH;                         // == availH (fills exactly)
  }

  // Backing store at device resolution; CSS (position:fixed;inset:0) sizes the
  // display box to the viewport, so we don't set style width/height/position here.
  canvas.width=Math.round(CAN_W*DPR);canvas.height=Math.round(CAN_H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.font=`${CH}px 'Courier New',monospace`;
  ctx.textBaseline='top';ctx.textAlign='left';
  applyScale();
}

// Place the solved grid inside the available area (below the top band),
// centring any leftover slack. Never upscales (keeps text crisp).
function applyScale(){
  const band=reservedBands();
  const availW=Math.max(80,CAN_W-band.left-band.right);
  const availH=Math.max(80,CAN_H-band.top-band.bottom);
  GSCALE=Math.min(1,availW/G_GRIDW,availH/G_GRIDH);
  GX=band.left+Math.max(0,Math.round((availW-G_GRIDW*GSCALE)/2)); // centre horizontally
  GY=band.top; // anchor to top band — the log absorbs vertical slack so the grid fills
}
// Full re-solve + repaint, for async callers (band-height changes, RAF).
function refit(){
  setupLayout();
  if(VPW<1||VPH<1)return;
  render();
}
function layoutViewportH(){
  return Math.round(window.innerHeight||document.documentElement.clientHeight||640);
}
function isKeyboardUp(){
  const vv=window.visualViewport;
  if(!vv)return false;
  return layoutViewportH()-vv.height-vv.offsetTop>60;
}
function updateCmdInputPosition(){
  const el=document.getElementById('inp');
  if(!el||el.style.display==='none'){el?.style.removeProperty('bottom');return;}
  const vv=window.visualViewport;
  if(!vv){el.style.removeProperty('bottom');return;}
  const lift=layoutViewportH()-vv.height-vv.offsetTop;
  if(lift>60)el.style.bottom=`${Math.max(0,Math.round(lift))}px`;
  else el.style.removeProperty('bottom');
}
function resetCmdInputStyle(){
  const el=document.getElementById('inp');
  if(!el)return;
  el.style.display='none';
  el.style.removeProperty('bottom');
  G.cmdMode=false;
}
let _refitTimer;
function scheduleRefit(ms=120){
  clearTimeout(_refitTimer);
  _refitTimer=setTimeout(refit,ms);
}
function bindViewportListeners(){
  window.addEventListener('resize',()=>scheduleRefit());
  window.addEventListener('orientationchange',()=>scheduleRefit(200));
  const vv=window.visualViewport;
  if(!vv)return;
  vv.addEventListener('resize',()=>{
    updateCmdInputPosition();
    if(!isKeyboardUp())scheduleRefit();
  });
  vv.addEventListener('scroll',()=>updateCmdInputPosition());
}
function fsSupported(){
  return!!(document.fullscreenEnabled||document.webkitFullscreenEnabled);
}
function fsActive(){
  return!!(document.fullscreenElement||document.webkitFullscreenElement);
}
function updateFsBtn(){
  const btn=document.getElementById('fs-btn');
  if(!btn)return;
  btn.textContent=fsActive()?'⤡':'⤢';
  btn.title=fsActive()?'Exit fullscreen':'Enter fullscreen';
}
async function toggleFullscreen(){
  try{
    if(fsActive()){
      if(document.exitFullscreen)await document.exitFullscreen();
      else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
    }else{
      const el=document.documentElement;
      if(el.requestFullscreen)await el.requestFullscreen();
      else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    }
  }catch(_){}
}
function bindFullscreen(){
  const btn=document.getElementById('fs-btn');
  if(!btn)return;
  if(!fsSupported()){btn.hidden=true;return;}
  btn.hidden=false;
  updateFsBtn();
  const fire=e=>{if(e)e.preventDefault();toggleFullscreen();};
  btn.addEventListener('touchstart',fire,{passive:false});
  btn.addEventListener('click',fire);
  document.addEventListener('fullscreenchange',()=>{updateFsBtn();scheduleRefit();});
  document.addEventListener('webkitfullscreenchange',()=>{updateFsBtn();scheduleRefit();});
}

// ── Renderer ──────────────────────────────────────────────────
function dimColor(hex){
  const r=parseInt(hex.slice(1,3),16),g2=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`#${Math.floor(r*0.35).toString(16).padStart(2,'0')}${Math.floor(g2*0.35).toString(16).padStart(2,'0')}${Math.floor(b*0.35).toString(16).padStart(2,'0')}`;
}
const _dimCache={};
function dim(hex){if(!_dimCache[hex])_dimCache[hex]=dimColor(hex);return _dimCache[hex];}

function drawGameView(){
  const camX=Math.max(0,Math.min(WW-VW,G.px-Math.floor(VW/2)));
  const camY=Math.max(0,Math.min(WH-VH,G.py-Math.floor(VH/2)));
  G._camX=camX;G._camY=camY;
  for(let sy=0;sy<VH;sy++){
    for(let sx=0;sx<VW;sx++){
      const wx=camX+sx,wy=camY+sy;
      const key=`${wx},${wy}`;
      const px2=sx*CW,py2=sy*CH;
      const isSeen=seen.has(key),isVis=visible.has(key);
      ctx.fillStyle=M.base;ctx.fillRect(px2,py2,CW,CH);
      if(!isSeen)continue;
      let c=grid[wy][wx];
      // Show entity if visible
      if(isVis){const ent=entityAt(wx,wy);if(ent)c=ent.char;}
      if(isVis&&wx===G.px&&wy===G.py)c='@';
      else if(c==='!'&&specials[key]?.kind==='terminal')c=terminalStatus(specials[key]).ch;
      let fg=FG[c]||M.txt;
      const tsp=specials[key];
      if(tsp?.kind==='terminal'){
        const st=terminalStatus(tsp);
        fg=isVis?st.color:dim(st.color);
      }else{
        fg=isVis?fg:dim(fg);
      }
      ctx.fillStyle=fg;
      ctx.fillText(c,px2,py2);
    }
  }
}

function drawSidebar(){
  if(IS_PORTRAIT)return;
  const ox=VW*CW, sbW=SW*CW, sbH=G_GRIDH;
  const sbChars=Math.max(8,Math.floor(sbW/SCW)-1); // chars that fit the panel width
  ctx.save();
  ctx.beginPath();ctx.rect(ox,0,sbW,sbH);ctx.clip(); // keep all HUD text inside the panel
  ctx.font=`${SCH}px 'Courier New',monospace`;
  ctx.fillStyle=M.mantle;ctx.fillRect(ox,0,sbW,sbH);
  // Border
  ctx.fillStyle=M.s1;
  for(let y=0;y<Math.ceil(sbH/SCH)+1;y++){ctx.fillText('│',ox,y*SCH);}
  let row=0;
  function sl(text,color=M.txt,x=1){ctx.fillStyle=color;ctx.fillText(text.slice(0,sbChars),ox+x*SCW,row++*SCH);}
  sl('══ ARTHACK ══',M.lav);sl('');
  const hlvl=heatLevel();
  sl(`HEAT: ${G.heat.toFixed(1)} [${HEAT_LABELS[hlvl]}]`,HEAT_COLORS[hlvl]);
  // Heat bar
  const barW=sbChars-3,filled=Math.round(G.heat/5*barW);
  ctx.fillStyle=M.s0;ctx.fillRect(ox+2*SCW,row*SCH,barW*SCW,SCH-2);
  ctx.fillStyle=HEAT_COLORS[hlvl];ctx.fillRect(ox+2*SCW,row*SCH,filled*SCW,SCH-2);
  row++;sl('');
  sl(`Sight +${HEAT_SIGHT[hlvl]} Hack -${Math.round(HEAT_HACK[hlvl]*100)}%`,M.sub);
  if(hlvl>=3)sl(`Reinforce: ${HEAT_INTVL[hlvl]}t`,M.red);
  sl(`HP: ${G.hp}/${G.maxHp}`,G.hp>G.maxHp*0.5?M.grn:G.hp>G.maxHp*0.25?M.yel:M.red);
  sl(`ATK: ${playerAtk()}  DEF: ${playerDef()}`,M.sub);
  sl(`Gear: ${formatGearStats(equippedGearStats())}`,M.tea);
  sl(`Wt: ${invWeight().toFixed(0)}/${maxCarry().toFixed(0)}  Pack: ${G.backpackInv.length}/${backpackCapacity()}  Bag: ${G.inventory.length}/${G.maxInv}`,M.sub);
  sl(`GP: ${Math.floor(G.walletCp/100)}g ${G.walletCp%100}cp`,M.yel);
  sl('');
  const lname=G.level===0?'Deep Dungeon':G.level===NUM_LEVELS-1?(G.escaped?'West Sally Port':'Castle'):`Stratum ${G.level+1}`;
  sl(`Floor: ${lname}`,M.blu);
  sl(`Turn: ${G.turnCount}`,M.sub);

// ── Full-window pannable / zoomable map overlay ───────────────
let MAPV=null;            // {cell, ox, oy}: px per world cell, screen px of world (0,0)
const MAP_CELL_MIN=0.5,MAP_CELL_MAX=40;
function mapAvail(){
  const b=reservedBands();
  return{x0:b.left,y0:b.top,w:Math.max(40,CAN_W-b.left-b.right),h:Math.max(40,CAN_H-b.top-b.bottom)};
}
function mapSeenBounds(){
  let minx=WW,miny=WH,maxx=0,maxy=0,any=false;
  for(const k of seen){
    const i=k.indexOf(',');const x=+k.slice(0,i),y=+k.slice(i+1);
    if(x<minx)minx=x;if(x>maxx)maxx=x;if(y<miny)miny=y;if(y>maxy)maxy=y;any=true;
  }
  if(!any)return{minx:Math.max(0,G.px-20),miny:Math.max(0,G.py-12),maxx:Math.min(WW-1,G.px+20),maxy:Math.min(WH-1,G.py+12)};
  return{minx,miny,maxx,maxy};
}
// Fit the explored area into the window and centre it.
function fitMap(){
  const a=mapAvail(),b=mapSeenBounds();
  const spanX=b.maxx-b.minx+1,spanY=b.maxy-b.miny+1;
  let cell=Math.min(a.w/spanX,a.h/spanY)*0.94;
  cell=Math.max(MAP_CELL_MIN,Math.min(MAP_CELL_MAX,cell));
  const cx=(b.minx+b.maxx+1)/2,cy=(b.miny+b.maxy+1)/2;
  MAPV={cell,ox:a.x0+a.w/2-cx*cell,oy:a.y0+a.h/2-cy*cell};
}
// Loose clamp: always keep a slice of the map within the window.
function mapClampPan(){
  if(!MAPV)return;
  const a=mapAvail(),mapW=WW*MAPV.cell,mapH=WH*MAPV.cell;
  MAPV.ox=Math.min(a.x0+a.w*0.8,Math.max(a.x0+a.w*0.2-mapW,MAPV.ox));
  MAPV.oy=Math.min(a.y0+a.h*0.8,Math.max(a.y0+a.h*0.2-mapH,MAPV.oy));
}
function mapZoomAt(fx,fy,factor){
  if(!MAPV)fitMap();
  const old=MAPV.cell;
  const cell=Math.max(MAP_CELL_MIN,Math.min(MAP_CELL_MAX,old*factor));
  if(cell===old)return;
  const wx=(fx-MAPV.ox)/old,wy=(fy-MAPV.oy)/old;
  MAPV.ox=fx-wx*cell;MAPV.oy=fy-wy*cell;MAPV.cell=cell;
  mapClampPan();
}
function openMapPanel(){G.overlay='map';MAPV=null;_mapPtrs.clear();_mapPinch=null;} // fit lazily on first draw (after ctx-bar sizes)
function drawMap(){
  if(!MAPV)fitMap();
  const a=mapAvail(),{cell,ox,oy}=MAPV;
  ctx.fillStyle='rgba(17,17,27,0.98)';ctx.fillRect(0,0,CAN_W,CAN_H);
  const x0=Math.max(0,Math.floor((a.x0-ox)/cell)),x1=Math.min(WW-1,Math.ceil((a.x0+a.w-ox)/cell));
  const y0=Math.max(0,Math.floor((a.y0-oy)/cell)),y1=Math.min(WH-1,Math.ceil((a.y0+a.h-oy)/cell));
  const px=Math.max(1,Math.ceil(cell));
  for(let wy=y0;wy<=y1;wy++)for(let wx=x0;wx<=x1;wx++){
    if(!seen.has(`${wx},${wy}`))continue;
    const c=grid[wy][wx];
    if(c===VOID)continue;
    ctx.fillStyle=FG[c]||M.s0;
    ctx.fillRect(ox+wx*cell,oy+wy*cell,px,px);
  }
  // Special markers (only what's been seen)
  const mk=Math.max(px,Math.ceil(cell*1.5)),off=(mk-px)/2;
  for(const[key,sp] of Object.entries(specials)){
    if(!seen.has(key))continue;
    let col=null;
    if(sp.kind==='terminal')col=terminalStatus(sp).color;
    else if(sp.kind==='shop')col=M.pch;
    else if(sp.kind==='station')col=M.yel;
    else if(sp.kind==='stairs_up'||sp.kind==='stairs_down')col=M.sky;
    else if(sp.kind==='portal')col=M.mau;
    else if(sp.kind==='gate')col=M.grn;
    if(!col)continue;
    const[wx,wy]=key.split(',').map(Number);
    ctx.fillStyle=col;
    ctx.fillRect(ox+wx*cell-off,oy+wy*cell-off,mk,mk);
  }
  // Player
  const pmk=Math.max(4,Math.ceil(cell*1.8)),poff=(pmk-px)/2;
  ctx.fillStyle=M.grn;
  ctx.fillRect(ox+G.px*cell-poff,oy+G.py*cell-poff,pmk,pmk);
  // Header / hints
  const lh=overlayCh();
  ctx.font=`${lh}px 'Courier New',monospace`;
  ctx.fillStyle=M.lav;ctx.fillText(`MAP — level ${G.level}  ·  ${cell.toFixed(1)} px/cell`,a.x0+6,a.y0+4);
  ctx.fillStyle=M.sub;
  ctx.fillText(TOUCH_MODE?'drag = pan · pinch = zoom · ZOOM/FIT/CLOSE above':'drag = pan · wheel or +/- = zoom · arrows = pan · f = fit · m/Esc = close',a.x0+6,a.y0+4+lh);
  ctx.fillStyle=M.s1;
  ctx.fillText('@ you · ! lock + unlock * secret R root · % shop A/F craft < > stairs',a.x0+6,a.y0+4+lh*2);
}

let OV_TOP=0,OV_H=0; // overlay content area (below the top control bar)
function ensureOverlayArea(){
  const b=reservedBands();
  OV_TOP=b.top;
  OV_H=Math.max(80,CAN_H-b.top-b.bottom);
}
function overlayCh(){return IS_PORTRAIT?SCH:CH;}
function overlayListPageSize(headerRows,footerRows){
  ensureOverlayArea();
  return Math.max(1,Math.min(20,Math.floor(OV_H/overlayCh())-headerRows-footerRows));
}
function archetypePageSize(){
  const footerRows=TOUCH_MODE?11:9;
  const headerRows=5;
  const maxVis=TOUCH_MODE?4:5;
  return Math.max(3,Math.min(maxVis,overlayListPageSize(headerRows,footerRows)));
}
function clampListView(cursor,scroll,len,pageSize){
  cursor=Math.max(0,Math.min(Math.max(0,len-1),cursor));
  if(cursor<scroll)scroll=cursor;
  if(cursor>=scroll+pageSize)scroll=cursor-pageSize+1;
  scroll=Math.max(0,Math.min(scroll,Math.max(0,len-pageSize)));
  return{cursor,scroll};
}
// Tap hit-test for scrollable list overlays (geometry set during draw).
let _OV_LISTS=[];
function registerOverlayList({startRow,listTopPx,rowH,scroll,len,visibleCount,cursorKey,onSelect}){
  const ch=overlayCh();
  const rh=rowH||ch;
  _OV_LISTS.push({listTop:listTopPx??(startRow*ch),rowH:rh,scroll:scroll||0,len,visibleCount,
    cursorKey:onSelect?null:cursorKey,onSelect});
}
function tapCraftTab(clientX,clientY){
  if(G.overlay!=='craft'||G.craftConfirm)return false;
  ensureOverlayArea();
  const rect=canvas.getBoundingClientRect();
  const y=clientY-rect.top-OV_TOP;
  const ch=overlayCh();
  const row=Math.floor(y/ch);
  let target=null;
  if(row===2)target='recipes';
  else if(row===3)target='socket';
  else return false;
  if(target===G.craftView)return false;
  if(target==='recipes'){
    G.craftView='recipes';G.craftCursor=0;G.craftScroll=0;G.craftConfirm=null;
  }else{
    G.craftView='socket';G.craftCursor=0;G.craftScroll=0;G.gemCursor=0;G.gemScroll=0;G.craftConfirm=null;
  }
  render();
  return true;
}
function tapOverlayList(clientY){
  if(!_OV_LISTS.length||!G.overlay)return false;
  ensureOverlayArea();
  const rect=canvas.getBoundingClientRect();
  const y=clientY-rect.top-OV_TOP;
  for(const list of _OV_LISTS){
    const row=Math.floor((y-list.listTop)/list.rowH);
    if(row<0||row>=list.visibleCount)continue;
    const idx=list.scroll+row;
    if(idx<0||idx>=list.len)continue;
    if(list.onSelect)list.onSelect(idx);
    else if(list.cursorKey)G[list.cursorKey]=idx;
    render();
    return true;
  }
  return false;
}

function overlayText(lines,ox=2,oy=1){
  const cw=IS_PORTRAIT?SCW:CW;
  const ch=IS_PORTRAIT?SCH:CH;
  ctx.font=`${ch}px 'Courier New',monospace`;
  let row=oy;
  for(const entry of lines){
    const[text='',color=M.txt,x=ox]=entry;
    const px=x*cw;
    const maxC=Math.max(8,Math.floor((CAN_W-px)/cw));
    if(text==='---'){
      ctx.fillStyle=M.s1;ctx.fillText('─'.repeat(maxC),px,row*ch);row++;continue;
    }
    ctx.fillStyle=color;
    const str=String(text);
    let drawX=px;
    if(str.charCodeAt(0)===0x2550){drawX=Math.max(0,Math.floor((CAN_W-str.length*cw)/2));}
    if(str.length<=maxC){
      ctx.fillText(str,drawX,row*ch);row++;
    }else if(!/\s/.test(str)){
      for(let i=0;i<str.length;i+=maxC){
        ctx.fillText(str.slice(i,i+maxC),px,row*ch);row++;
      }
    }else{
      const indent=str.match(/^(\s*)/)[0];
      const words=str.trimStart().split(/\s+/);
      let ln=indent;
      for(const w of words){
        const test=ln.length>indent.length?ln+' '+w:ln+w;
        if(test.length>maxC&&ln.length>indent.length){
          ctx.fillText(ln,px,row*ch);row++;ln=indent+w;
        }else{ln=test;}
      }
      if(ln){ctx.fillText(ln,px,row*ch);row++;}
    }
  }
  ctx.font=`${CH}px 'Courier New',monospace`;
  return row;
}

function drawArchetype(){
  const order=ARCHETYPE_ORDER;
  const pg=archetypePageSize();
  const cur=Math.max(0,Math.min(G._archCursor||0,order.length-1));
  ({cursor:G._archCursor,scroll:G._archScroll}=clampListView(cur,G._archScroll||0,order.length,pg));
  const scrollHint=order.length>pg?` · scroll ${G._archScroll+1}-${Math.min(order.length,G._archScroll+pg)}/${order.length}`:'';
  let row=overlayText([
    ['═══  CHOOSE YOUR ARCHETYPE  ═══',M.lav,2],
    [TOUCH_MODE?`Tap class · ◀▶ scroll · START${scrollHint}`:`↑↓ select · PgUp/Dn · 1-${Math.min(9,pg)} pick visible${scrollHint}`,M.sub,2],
    ['---']
  ]);
  const listStartRow=row;
  const rowMul=TOUCH_MODE?2:1;
  const view=order.slice(G._archScroll,G._archScroll+pg);
  for(let i=0;i<view.length;i++){
    const idx=G._archScroll+i;
    const info=ARCHETYPES[view[i]];
    const hl=idx===G._archCursor;
    row=overlayText([[`${hl?'▶ ':'   '}[${(i+1)}] ${info.label}`,hl?M.yel:M.txt,2]],2,row);
    if(TOUCH_MODE&&i<view.length-1)row=overlayText([['']],2,row);
  }
  if(order.length>pg)row=overlayText([[`PgUp/Dn or ◀▶ to scroll classes`,M.s1,2]],2,row);
  registerOverlayList({startRow:listStartRow,rowH:overlayCh()*rowMul,scroll:G._archScroll,len:order.length,visibleCount:view.length,
    onSelect:idx=>{G._archCursor=idx;render();}});
  row=overlayText([['---']],2,row);
  const sel=ARCHETYPES[order[G._archCursor||0]];
  const sk=Object.entries(sel.skills).map(([k,v])=>`${k}+${v}`).join('  ');
  const mods=sel.modules.length>4?`${sel.modules.slice(0,4).join(', ')}…`:sel.modules.join(', ');
  const psy=sel.personality?`Luck ${sel.personality.luck} Charm ${sel.personality.charm} Wit ${sel.personality.wit} Nerve ${sel.personality.nerve}`:'';
  row=overlayText([
    [sel.desc,M.tea,2],
    [`Skills: ${sk}`,M.sky,2],
    [`Modules: ${mods}`,M.pch,2],
    [psy,M.sub,2],
    [`Passive: ${sel.passive}`,M.grn,2]
  ],2,row);
}

function drawDifficulty(){
  const order=['easy','normal','hard','nightmare'];
  const mult={easy:'0.85× stats',normal:'1.00× stats',hard:'1.20× stats',nightmare:'1.35× stats'};
  const blurb={
    easy:'Forgiving — good for learning terminals and the map.',
    normal:'Standard castle run.',

  const cur=G._diffCursor??1;

    ['═══  CHOOSE DIFFICULTY  ═══',M.lav,2],
    ['Enemy HP, attack, and armor scale from this choice.',M.sub,2],

  ]);
  const listStartRow=row;
  const rowMul=TOUCH_MODE?2:1;

    const d=order[i],hl=i===cur;
    row=overlayText([[`${hl?'▶ ':'   '}[${i+1}] ${d.toUpperCase().padEnd(10)} ${mult[d]}`,hl?M.yel:M.txt,2]],2,row);
    if(TOUCH_MODE&&i<order.length-1)row=overlayText([['']],2,row);
  }

    onSelect:idx=>{G._diffCursor=idx;render();}});
  row=overlayText([['---']],2,row);
  row=overlayText([[blurb[order[cur]]||mult[order[cur]],M.tea,2]],2,row);
}

function confirmArchetype(){

function drawTitle(){
  ctx.fillStyle=M.crust;ctx.fillRect(0,0,CAN_W,CAN_H);
  ctx.textAlign='left';ctx.textBaseline='top';
  const lines=HACKER_ART;
  // Scale the monospace font so the widest line fits the window width AND the
  // whole block fits the height — fillText never wraps, so this avoids overflow.
  const trial=24;
  ctx.font=`${trial}px 'Courier New',monospace`;
  let widest=1;for(const l of lines){const w=ctx.measureText(l).width;if(w>widest)widest=w;}
  const availW=CAN_W*0.9,availH=CAN_H*0.58;
  let fpx=trial*Math.min(availW/widest,availH/(lines.length*trial*1.15));
  fpx=Math.max(5,Math.min(28,fpx));
  ctx.font=`${fpx}px 'Courier New',monospace`;
  const lineH=fpx*1.15;
  let w2=1;for(const l of lines){const w=ctx.measureText(l).width;if(w>w2)w2=w;}
  const x0=Math.max(2,(CAN_W-w2)/2);          // single origin keeps the art aligned
  const topY=Math.max(8,CAN_H*0.05);
  ctx.fillStyle=M.grn;
  for(let i=0;i<lines.length;i++)ctx.fillText(lines[i],x0,topY+i*lineH);
  let y=topY+lines.length*lineH+lineH*0.5;
  const ctr=(txt)=>{ctx.fillText(txt,(CAN_W-ctx.measureText(txt).width)/2,y);};
  const tfs=Math.max(14,Math.min(44,Math.floor(CAN_W*0.075)));
  ctx.font=`bold ${tfs}px 'Courier New',monospace`;ctx.fillStyle=M.tea;ctr('ARTHACK');y+=tfs*1.25;
  const sfs=Math.max(10,Math.min(18,Math.floor(CAN_W*0.028)));
  ctx.font=`${sfs}px 'Courier New',monospace`;ctx.fillStyle=M.sub;ctr('D U N G E O N   E S C A P E');y+=sfs*2.1;
  let saves=0;for(let i=0;i<RUN_SLOT_COUNT;i++)if(peekRunSave(i))saves++;
  ctx.fillStyle=M.lav;ctr(TOUCH_MODE?'Tap NEW GAME or LOAD below':'[N] New Game        [L] Load Game');
  if(saves>0){y+=sfs*1.7;ctx.fillStyle=M.s1;ctr(`${saves} saved run${saves>1?'s':''} on this device`);}
}
function handleTitleKey(e){
  if(e.key==='n'||e.key==='N'){titleNewGame();return;}
  if(e.key==='l'||e.key==='L'){titleLoad();return;}
  if(e.key==='Enter'){(hasRunSave()?titleLoad:titleNewGame)();return;}
  render();
}
function titleNewGame(){
  G.slotPick=null;
  let empty=-1;for(let i=0;i<RUN_SLOT_COUNT;i++)if(!peekRunSave(i)){empty=i;break;}
  if(empty<0){G.overlay='resume';G._resumeCursor=0;addLog('All save slots are full — pick one to overwrite for a new run.',M.yel);render();return;}
  _activeRunSlot=empty;
  resetPanelSaveTrack();
  G.overlay='archetype';G._archCursor=0;G._archScroll=0;render();
}
function titleLoad(){
  G.slotPick=null;G._loadMsg='';
  G.overlay='resume';G._resumeCursor=firstOccupiedRunSlot();render();

function drawResume(){
  const slots=RUN_SLOT_COUNT;
  const cur=Math.max(0,Math.min(G._resumeCursor??firstOccupiedRunSlot(),slots-1));
  G._resumeCursor=cur;
  const picking=G.slotPick==='import';
  let row=overlayText([
    [picking?'═══  IMPORT — CHOOSE SLOT  ═══':'═══  SAVED RUNS  ═══',M.lav,2],
    [picking?(TOUCH_MODE?'Tap a slot · IMPORT HERE / CANCEL below':'↑↓ select slot · Enter import here · Esc cancel')
            :(TOUCH_MODE?'Tap slot · CONTINUE / NEW / EXPORT / IMPORT / DELETE below':'↑↓ select · Enter continue · N new · E export · I import · Del erase'),M.sub,2],
    ['---']
  ]);
  if(G._loadMsg)row=overlayText([['! '+G._loadMsg,M.red,2],['---']],2,row);
  const listStartRow=row;
  for(let i=0;i<slots;i++){
    const info=peekRunSave(i);
    const hl=i===cur;
    const label=`${hl?'▶ ':'   '}[${i+1}] `;
    if(info){
      const arch=ARCHETYPES[info.archetype]?.label||info.archetype||'?';
      row=overlayText([[`${label}Turn ${info.turn} · ${arch} · ${info.difficulty||'normal'} · ${info.phase||'escape'}`,hl?M.yel:M.txt,2]],2,row);
      row=overlayText([[`     L${(info.level??0)+1} · ${info.walletCp||0}cp · clues ${info.clues||0}/3`,M.sub,2]],2,row);
    }else{
      row=overlayText([[`${label}(empty) — new game`,hl?M.yel:M.s1,2]],2,row);
    }
  }
  registerOverlayList({startRow:listStartRow,rowH:overlayCh()*2,scroll:0,len:slots,visibleCount:slots,
    onSelect:idx=>{G._resumeCursor=idx;render();}});
  if(picking){
    const occ=peekRunSave(cur);
    row=overlayText([
      ['---'],
      [occ?`Slot ${cur+1} holds a save — importing here will OVERWRITE it.`:`Slot ${cur+1} is empty — the imported run will fill it.`,occ?M.yel:M.sub,2],
      ['Enter / IMPORT HERE = pick a .arthack file · Esc = cancel.',M.sub,2]
    ],2,row);
  }else{
    row=overlayText([
      ['---'],
      ['Autosave on panel open/close · SAVE in MORE menu · 4 slots · EXPORT/IMPORT .arthack files.',M.s1,2],
      [peekRunSave(cur)?(TOUCH_MODE?'CONTINUE loads highlighted slot.':'Enter / C = continue highlighted slot.'):(TOUCH_MODE?'NEW GAME starts in highlighted slot.':'Enter / N = new game in highlighted slot.'),M.sub,2]
    ],2,row);
  }
}
function continueRunSave(slot){
  const s=slot??G._resumeCursor??0;
  G.slotPick=null;
  if(!loadRunState(s)){clearRunState(s);resetPanelSaveTrack();G.overlay='archetype';G._archCursor=0;G._archScroll=0;return false;}
  G.overlay=null;
  resetPanelSaveTrack(null);
  computeVisible(visionRadius());
  render();
  return true;
}
function beginNewRunSetup(slot){
  const s=slot??G._resumeCursor??0;
  G.slotPick=null;
  if(peekRunSave(s)&&!confirm(`Overwrite save slot ${s+1}?`))return;
  clearRunState(s);
  _activeRunSlot=s;
  resetPanelSaveTrack();
  G.overlay='archetype';
  G._archCursor=0;G._archScroll=0;
  render();
}
function handleResumeKey(e){
  const slots=RUN_SLOT_COUNT;
  const cur=G._resumeCursor??0;
  if(G.slotPick==='import'){
    if(e.key==='Escape'||e.key==='q'){G.slotPick=null;render();return;}
    if(e.key>='1'&&e.key<=String(slots)){G._resumeCursor=+e.key-1;render();return;}
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='k')G._resumeCursor=Math.max(0,cur-1);
    else if(e.key==='ArrowDown'||e.key==='s'||e.key==='j')G._resumeCursor=Math.min(slots-1,cur+1);
    else if(e.key==='Enter'){slotPickConfirm();return;}
    render();return;
  }
  if(e.key>='1'&&e.key<=String(slots)){G._resumeCursor=+e.key-1;render();return;}
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='k')G._resumeCursor=Math.max(0,cur-1);
  else if(e.key==='ArrowDown'||e.key==='s'||e.key==='j')G._resumeCursor=Math.min(slots-1,cur+1);
  else if(e.key==='Delete'||e.key==='Backspace'){
    if(peekRunSave(cur)&&confirm(`Delete save slot ${cur+1}?`)){
      clearRunState(cur);
      if(!hasRunSave()){G.overlay='archetype';G._archCursor=0;G._archScroll=0;}
    }
    render();return;
  }
  else if(e.key==='Enter'||(e.key==='c'||e.key==='C')){
    if(peekRunSave(cur))continueRunSave(cur);
    else beginNewRunSetup(cur);
    return;
  }
  else if(e.key==='n'||e.key==='N')beginNewRunSetup(cur);
  else if(e.key==='e'||e.key==='E'){if(peekRunSave(cur))exportRunSave(cur);return;}
  else if(e.key==='i'||e.key==='I'){promptImportRunSave(cur);return;}
  render();
}

function logOverlayRows(width=92){
  const rows=[];
  for(const entry of filteredLog()){
    const prefix=`[${String(entry.turn).padStart(4,'0')}] `;
    const text=String(entry.msg||'');
    let line=prefix+text;
    while(line.length>width){
      rows.push({msg:line.slice(0,width),color:entry.color||M.txt});
      line='      '+line.slice(width);
    }
    rows.push({msg:line,color:entry.color||M.txt});
  }
  if(!rows.length)rows.push({msg:'(no log entries yet)',color:M.sub});
  return rows;
}

function logOverlayGeometry(){
  ensureOverlayArea();
  const cw=IS_PORTRAIT?SCW:CW,ch=IS_PORTRAIT?SCH:CH;
  const cols=Math.max(1,Math.floor(CAN_W/cw)),screenRows=Math.max(1,Math.floor(OV_H/ch));
  const w=Math.max(32,Math.min(cols-4,96));
  const h=Math.max(10,Math.min(screenRows-2,30));
  const left=Math.max(1,Math.floor((cols-w)/2));
  const top=Math.max(0,Math.floor((screenRows-h)/2));
  const contentW=Math.max(8,w-4),contentH=Math.max(1,h-5);
  return{cw,ch,w,h,left,top,contentW,contentH};
}
function openLogOverlay(){
  G.overlay='log';
  ensureOverlayArea();
  const geo=logOverlayGeometry();
  const rows=logOverlayRows(geo.contentW);
  G.logScroll=Math.max(0,rows.length-geo.contentH);
}

function drawLogOverlay(){
  const geo=logOverlayGeometry();
  const {cw,ch,w,h,left,top,contentW,contentH}=geo;
  const rows=logOverlayRows(contentW);
  const maxScroll=Math.max(0,rows.length-contentH);
  G.logScroll=Math.max(0,Math.min(G.logScroll,maxScroll));
  ctx.font=`${ch}px 'Courier New',monospace`;
  ctx.fillStyle=M.crust;ctx.fillRect(left*cw,top*ch,w*cw,h*ch);
  ctx.fillStyle=M.s1;
  ctx.fillText('╔'+'═'.repeat(w-2)+'╗',left*cw,top*ch);
  for(let i=1;i<h-1;i++)ctx.fillText('║'+' '.repeat(w-2)+'║',left*cw,(top+i)*ch);
  ctx.fillText('╚'+'═'.repeat(w-2)+'╝',left*cw,(top+h-1)*ch);
  ctx.fillStyle=M.lav;ctx.fillText(` LOG · ${logFilterSpec().label} (${filteredLog().length}/${LOG.length}) `,(left+3)*cw,top*ch);
  const visibleRows=rows.slice(G.logScroll,G.logScroll+contentH);
  for(let i=0;i<visibleRows.length;i++){
    ctx.fillStyle=visibleRows[i].color||M.txt;
    ctx.fillText(visibleRows[i].msg.slice(0,contentW),(left+2)*cw,(top+2+i)*ch);
  }
  const page=` ${G.logScroll+1}-${Math.min(rows.length,G.logScroll+contentH)}/${rows.length}  f=filter  ↑↓ PgUp/PgDn  Esc `;
  ctx.fillStyle=M.sub;ctx.fillText(page.slice(0,contentW),(left+2)*cw,(top+h-2)*ch);
  ctx.font=`${CH}px 'Courier New',monospace`;
  registerOverlayList({listTopPx:(top+2)*ch,rowH:ch,scroll:G.logScroll,len:rows.length,visibleCount:visibleRows.length,
    onSelect:idx=>{G.logScroll=Math.max(0,Math.min(maxScroll,idx));}});
}

function syncSecretCatalog(){
  for(const sp of Object.values(specials)){
    if(sp.kind!=='terminal'||!sp._secretExtracted)continue;
    if(G.secrets.some(s=>s.ssid===sp.ssid))continue;
    initTerminalMeta(sp);
    recordTerminalSecret(sp,ensureTermVFS(sp),false);
  }
}
function secretEntries(){
  syncSecretCatalog();
  return[...G.secrets].sort((a,b)=>a.turn-b.turn||a.ssid.localeCompare(b.ssid));
}
function recordTerminalSecret(sp,vfs,notify=true){
  initTerminalMeta(sp);
  const path=sp._secretPath||termSecretPathFor(sp);
  let preview='';
  const node=vfs?.paths?.[path];
  if(node?.content){
    const lines=node.content.split('\n').map(l=>l.trim()).filter(Boolean);
    const hot=lines.find(l=>/pass|secret|key|token|cred|api|auth|fallback|db_/i.test(l));
    preview=(hot||lines[0]||'').slice(0,72);
  }
  const unlocks=termSecretUnlockList(sp);
  const entry={
    ssid:sp.ssid,control:sp.control||'?',
    hostname:sp.hostname||'',ip:sp.ip||'',
    path,preview,turn:G.turnCount,unlocks
  };
  if(G.secrets.some(s=>s.ssid===sp.ssid&&!s.partial))return entry;
  const partialIdx=G.secrets.findIndex(s=>s.ssid===sp.ssid&&s.partial);
  if(partialIdx>=0)G.secrets.splice(partialIdx,1);
  G.secrets.push(entry);
  if(notify){
    addLog(`SECRET FOUND — ${sp.ssid} (${sp.control})`,M.yel);
    addLog(`  file: ${path}  host: ${sp.hostname||'?'}  ${sp.ip||'?'}`,M.sub);
    if(preview)addLog(`  ${preview}`,M.pch);
    if(unlocks.length)addLog(`  Unlocks instant-root on: ${unlocks.map(u=>u.ssid).join(', ')}`,M.grn);
  }
  return entry;
}

function invMeasureVisibleCount(entries,scroll,budget){
  let used=0,count=0,lastCat=null;
  for(let i=scroll;i<entries.length;i++){
    const ent=entries[i];
    let need=0;
    if(ent.category!==lastCat){need+=1;lastCat=ent.category;}
    if(TOUCH_MODE&&i>scroll)need+=1;
    need+=1;
    if(used+need>budget)break;
    used+=need;
    count++;
  }
  return count;
}
function invEnsureScroll(entries,cursor,listBudget,startScroll){
  if(!entries.length)return 0;
  cursor=Math.max(0,Math.min(cursor,entries.length-1));
  let scroll=Math.max(0,Math.min(startScroll||0,entries.length-1));
  while(scroll>0&&cursor<scroll)scroll--;
  while(scroll<entries.length){
    const n=invMeasureVisibleCount(entries,scroll,listBudget);
    if(!n)break;
    if(cursor<scroll+n)break;
    scroll++;
  }
  return scroll;
}
function invPanelLayout(entries,cursor){
  ensureOverlayArea();
  const ch=overlayCh();
  const maxRows=Math.floor(OV_H/ch);
  const headerRows=3;
  const sel=entries.length?entries[Math.max(0,Math.min(cursor??0,entries.length-1))]:null;
  const showSel=!!(sel&&maxRows>=12);
  const footerLines=showSel?7:4;
  const footerStart=Math.max(headerRows,Math.min(maxRows-footerLines,Math.max(headerRows+1,maxRows-3)));
  const listBudget=Math.max(1,footerStart-headerRows);
  const scroll=invEnsureScroll(entries,cursor??0,listBudget,G.invScroll||0);
  const visibleCount=invMeasureVisibleCount(entries,scroll,listBudget);
  return{footerStart,listBudget,scroll,visibleCount,sel:showSel?sel:null,ch};
}

function craftRecipeList(){return G.craftFilter?CRAFT_RECIPES.filter(r=>canCraft(r)):CRAFT_RECIPES;}
function craftSelectedRecipe(){return craftRecipeList()[G.craftCursor]||null;}
function resolveSocketPick(){
  const items=socketableItems(),gems=availableGems();
  let ci=Math.max(0,Math.min(items.length-1,G.craftCursor||0));
  let gi=Math.max(0,Math.min(gems.length-1,G.gemCursor||0));
  G.craftCursor=ci;G.gemCursor=gi;
  return{items,gems,item:items[ci]?.item,gem:gems[gi]};
}
function findHeldGem(gem){
  if(!gem)return null;
  const gems=availableGems();
  return gems.find(g=>g===gem)||gems.find(g=>g.name===gem.name)||null;
}
function resolveSocketItem(item){
  if(!item)return null;
  for(const slot of EQUIP_SOCKET_SLOTS){
    if(G.equipped[slot]===item)return G.equipped[slot];
  }
  for(const slot of CONSOLE_SLOTS){
    if(G.console?.[slot]===item)return G.console[slot];
  }
  const inBag=G.inventory.find(it=>it===item||it.name===item.name);
  if(inBag)return inBag;
  return G.backpackInv.find(it=>it===item||it.name===item.name)||null;
}
function beginSocketConfirm(){
  G.craftMsg='';
  const{items,gems,item,gem}=resolveSocketPick();
  if(!craftStationOk('anvil')){G.craftMsg='Need anvil access (adjacent or anvil beacon).';addLog(G.craftMsg,M.red);return false;}
  if(!items.length){G.craftMsg='No socketable gear — equip gear, jewelry, backpacks, or rig parts.';addLog(G.craftMsg,M.red);return false;}
  if(!gems.length){G.craftMsg='No gems in inventory.';addLog(G.craftMsg,M.red);return false;}
  if(!item||!gem){G.craftMsg='Tap a gear row and a gem row to select both.';return false;}
  G.craftConfirm={item,gem};
  return true;
}
function confirmSocketGem(){
  if(!G.craftConfirm)return false;
  const item=resolveSocketItem(G.craftConfirm.item);
  const gem=findHeldGem(G.craftConfirm.gem);
  if(!item||!gem){G.craftMsg='Item or gem no longer available.';G.craftConfirm=null;addLog(G.craftMsg,M.red);return false;}
  if(socketGem(item,gem)){
    G.craftConfirm=null;G.craftMsg='';
    endTurn();
    return true;
  }
  G.craftMsg='Socket failed — stay next to the anvil.';
  G.craftConfirm=null;
  return false;
}
function socketSelectedGem(){
  G.craftMsg='';
  const{items,gems,item,gem}=resolveSocketPick();
  if(!craftStationOk('anvil')){G.craftMsg='Need anvil access (adjacent or anvil beacon).';addLog(G.craftMsg,M.red);return false;}
  if(!items.length){G.craftMsg='No socketable gear — equip gear, jewelry, backpacks, or rig parts.';addLog(G.craftMsg,M.red);return false;}
  if(!gems.length){G.craftMsg='No gems in inventory.';addLog(G.craftMsg,M.red);return false;}
  if(!item||!gem){G.craftMsg='Tap a gear row and a gem row to select both.';return false;}
  const liveItem=resolveSocketItem(item),liveGem=findHeldGem(gem);
  if(!liveItem||!liveGem){G.craftMsg='Item or gem no longer available.';return false;}
  if(socketGem(liveItem,liveGem)){G.craftConfirm=null;G.craftMsg='';endTurn();return true;}
  G.craftMsg='Socket failed — stay next to the anvil.';
  return false;
}

function handleConsoleKey(e){
  if(e.key==='Escape'||e.key==='q'||e.key==='0'){G.overlay=null;return;}
  const slots=CONSOLE_SLOTS,inv=consolePartsInInv();
  const focus=G.consoleFocus||'slots';
  if(e.key==='Tab'){G.consoleFocus=focus==='slots'?'parts':'slots';return;}
  if(focus==='slots'){
    if(e.key==='ArrowUp'||e.key==='k')G.consoleCursor=Math.max(0,(G.consoleCursor||0)-1);
    else if(e.key==='ArrowDown'||e.key==='j')G.consoleCursor=Math.min(slots.length-1,(G.consoleCursor||0)+1);
    else if(e.key==='r'||e.key==='R')uninstallConsolePart(slots[G.consoleCursor||0]);
    else if((e.key==='e'||e.key==='E'||e.key==='Enter')&&inv.length){
      const part=inv[G.consoleInvCursor||0];
      if(part)installConsolePart(part);
    }
  }else{
    if(e.key==='ArrowUp'||e.key==='k')G.consoleInvCursor=Math.max(0,(G.consoleInvCursor||0)-1);
    else if(e.key==='ArrowDown'||e.key==='j')G.consoleInvCursor=Math.min(Math.max(0,inv.length-1),(G.consoleInvCursor||0)+1);
    else if(e.key==='e'||e.key==='E'||e.key==='Enter'){
      const part=inv[G.consoleInvCursor||0];
      if(part)installConsolePart(part);
    }
  }
  computeVisible(visionRadius());
}

function applyMinigameBonus(type,won){
  if(!won)return;
  G.hackBonus=G.hackBonus||{};
  const b=G.hackBonus;
  if(type==='password'||type==='stop_cursor'||type==='confirm_inject')b.chance=(b.chance||0)+0.10;
  else if(type==='fake_log')b.noHoneypot=true;
  else if(type==='port_knock'){addHeat(meterDelta(-1));b.skipTool='port_scan';}
  else if(type==='mac_match')b.revealControl=true;
  else if(type==='exploit_chain')b.chance=(b.chance||0)+0.15;
  else if(type==='traffic_timing')b.noHeat=true;
  else if(type==='sql_inject')b.chance=(b.chance||0)+0.12;
  else if(type==='clear_logs'){addHeat(meterDelta(-1));}
  else if(type==='pick_cve')b.chance=(b.chance||0)+0.08;
  else if(type==='hold_decrypt'){G.walletCp+=ri(40,90);addLog('[+] Decrypted bonus cache.',M.pch);}
  else if(type==='type_word')b.chance=(b.chance||0)+0.20;

  else if(type==='env_order')G.hackBonus.pickSecretUnlock=true;

function mkPasswordGame(ctx){
  const raw=fakePwd().replace(/[^a-zA-Z0-9]/g,'').toUpperCase();
  const word=raw.slice(0,Math.min(5,Math.max(4,raw.length)));
  const grid=Array(16).fill('');
  const row=ri(0,3),col=ri(0,4-word.length);
  for(let i=0;i<word.length;i++)grid[row*4+col+i]=word[i];
  const pool='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  for(let i=0;i<16;i++)if(!grid[i])grid[i]=pool[ri(0,pool.length-1)];
  let d1=fakePwd(null,1).slice(0,8).toUpperCase(),d2=fakePwd(null,2).slice(0,8).toUpperCase();
  while(d1===word)d1=fakePwd(null,3).slice(0,8).toUpperCase();
  while(d2===word||d2===d1)d2=fakePwd(null,4).slice(0,8).toUpperCase();
  const choices=sh([word,d1,d2]);
  return{type:'password',title:'PASSWORD CRACK',hint:`Hints: length ${word.length}, contains "${word.slice(0,2)}"`,
    ctx,choices,answer:word,grid,cursor:0,taps:[]};
}
